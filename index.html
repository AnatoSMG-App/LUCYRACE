<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - PROFESIONAL V2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #header { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        #header h1 { margin: 0; font-size: 1.4em; color: #0f0; text-shadow: 0 0 10px #0f0; }
        #tank-display-top { position: absolute; top: 10px; right: 15px; font-size: 3.5em; font-weight: 900; color: #0f0; z-index: 1001; }
        
        #map { height: 100vh; width: 100vw; z-index: 1; }

        .controls { position: absolute; bottom: 15px; left: 10px; right: 10px; background: rgba(0,0,0,0.95); padding: 15px; border-radius: 20px; z-index: 1000; border: 2px solid #0f0; }
        
        /* MINI CONTADORES FLOTANTES (Lo que pediste en el video) */
        .floating-stats { display: flex; justify-content: space-around; margin-bottom: 10px; text-align: center; }
        .stat-group { flex: 1; padding: 5px; border-radius: 10px; }
        .stat-group.cliente { border: 1px solid #ffae00; margin-right: 5px; color: #ffae00; }
        .stat-group.extra { border: 1px solid #ff00ea; margin-left: 5px; color: #ff00ea; }
        .mini-label { font-size: 0.5em; font-weight: bold; text-transform: uppercase; display: block; }
        .mini-val { font-size: 0.9em; font-weight: bold; }
        .mini-money { font-size: 1.1em; display: block; color: #fff; }

        .btn-group { display: flex; gap: 10px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn-start { background: #0f0; color: #000; }
        .btn-pause { background: #ffae00; color: #000; }
        .btn-extra { background: #00fbff; color: #000; }
        .btn-stop { background: #ff0000; color: #fff; margin-top: 10px; height: 45px; padding: 0; }

        /* HISTORIAL RECUPERADO */
        #pantalla-informe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 2000; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .corte-card { padding: 12px; border-radius: 12px; margin-bottom: 10px; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-dias { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
        .btn-dias button { padding: 10px; background: #f0f0f0; font-size: 0.75em; color: #000; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="header"><h1>LUCY JHA</h1></div>
    <div id="tank-display-top">10.0</div>

    <div id="pantalla-informe">
        <button onclick="cerrarInforme()" style="background:#000; color:#fff; width: auto; margin-bottom: 15px; border-radius: 10px;">⬅ VOLVER</button>
        <div class="corte-card" style="background: #28a745;"><b>7 DÍAS (SEMANAL):</b><br><span id="c7-txt">0.0 km | $0.00</span></div>
        <div class="corte-card" style="background: #17a2b8;"><b>15 DÍAS (QUINCENAL):</b><br><span id="c15-txt">0.0 km | $0.00</span></div>
        
        <div id="detalle-dia" style="background:#fff3cd; padding:12px; border-radius:12px; font-size:0.9em; margin: 10px 0; border: 1px solid #ffeeba;">Toca un día para ver detalle:</div>
        
        <div class="btn-dias">
            <button onclick="verDia(this, 'Lunes')">LUN</button>
            <button onclick="verDia(this, 'Martes')">MAR</button>
            <button onclick="verDia(this, 'Miércoles')">MIE</button>
            <button onclick="verDia(this, 'Jueves')">JUE</button>
            <button onclick="verDia(this, 'Viernes')">VIE</button>
            <button onclick="verDia(this, 'Sábado')">SAB</button>
            <button onclick="verDia(this, 'Domingo')">DOM</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="floating-stats">
            <div class="stat-group cliente">
                <span class="mini-label">Ruta Cliente</span>
                <span class="mini-val"><span id="c-time">00:00</span> | <span id="c-km">0.0</span>km</span>
                <span class="mini-money">$<span id="c-money">0.00</span></span>
            </div>
            <div class="stat-group extra">
                <span class="mini-label">Mandado Extra</span>
                <span class="mini-val"><span id="e-time">00:00</span> | <span id="e-km">0.0</span>km</span>
                <span class="mini-money">$<span id="e-money">0.00</span></span>
            </div>
        </div>

        <div id="setup-area">
            <input type="range" id="fuel-slider" min="0" max="15" step="0.5" value="10" style="width:100%; accent-color:#0f0;">
            <button class="btn-start" style="margin-top:10px" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>

        <div id="run-area" style="display:none;">
            <div class="btn-group">
                <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">PAUSA ⏳</button>
                <button id="extra-btn" class="btn-extra" onclick="activarExtra()">EXTRA 🚀</button>
            </div>
            <button class="btn-stop" onclick="finalizarRuta()">TERMINAR DÍA 🏁</button>
        </div>
        
        <button onclick="abrirInforme()" style="background:#fff; color:#000; margin-top:10px; height:45px; border:2px solid #0f0; border-radius:12px; font-weight:bold;">VER HISTORIAL 📊</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let path = L.polyline([], {color: '#00fbff', weight: 5}).addTo(map);
        let marker = L.circleMarker([0,0], {radius: 6, color: '#fff', fillColor: '#0f0', fillOpacity: 1}).addTo(map);

        let segsC = 0, segsE = 0, timer, lastPos = null;
        let dRuta = 0, dExtra = 0, fuelI = 10, fuelR = 10, enP = false, enE = false;
        let factor = 0.05; const PRECIO = 0.50;

        document.getElementById('fuel-slider').oninput = function() { fuelI = fuelR = parseFloat(this.value); actualizarUI(); };

        function actualizarUI() {
            document.getElementById('tank-display-top').innerText = fuelR.toFixed(1);
            // Actualizar Cliente
            document.getElementById('c-km').innerText = dRuta.toFixed(1);
            document.getElementById('c-money').innerText = (dRuta * factor * PRECIO).toFixed(2);
            // Actualizar Extra
            document.getElementById('e-km').innerText = dExtra.toFixed(1);
            document.getElementById('e-money').innerText = (dExtra * factor * PRECIO).toFixed(2);
            
            // Totales para tarjetas de informe
            let totalKm = dRuta + dExtra;
            let totalUsd = (totalKm * factor * PRECIO).toFixed(2);
            document.getElementById('c7-txt').innerText = `${totalKm.toFixed(1)} km | $${totalUsd}`;
            document.getElementById('c15-txt').innerText = `${totalKm.toFixed(1)} km | $${totalUsd}`;
        }

        function iniciarRuta() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('run-area').style.display = 'block';
            timer = setInterval(() => {
                if(!enP) {
                    if(!enE) { segsC++; document.getElementById('c-time').innerText = fmt(segsC); }
                    else { segsE++; document.getElementById('e-time').innerText = fmt(segsE); }
                }
            }, 1000);

            navigator.geolocation.watchPosition(pos => {
                if(enP) return;
                if(lastPos) {
                    let d = 0.03; // Simulación de avance
                    fuelR -= (d * factor);
                    if(!enE) dRuta += d; else dExtra += d;
                    actualizarUI();
                }
                lastPos = {lat: pos.coords.latitude, lon: pos.coords.longitude};
                marker.setLatLng([lastPos.lat, lastPos.lon]);
                path.addLatLng([lastPos.lat, lastPos.lon]);
                map.panTo([lastPos.lat, lastPos.lon]);
            }, null, {enableHighAccuracy: true});
        }

        function activarExtra() {
            enE = !enE;
            document.getElementById('extra-btn').style.background = enE ? "#ff00ea" : "#00fbff";
            document.getElementById('extra-btn').innerText = enE ? "EXTRA ON" : "EXTRA 🚀";
        }

        function pausarRuta() { enP = !enP; document.getElementById('pause-btn').innerText = enP ? "CONTINUAR" : "PAUSA ⏳"; }
        function fmt(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }
        function abrirInforme() { document.getElementById('pantalla-informe').style.display = 'block'; }
        function cerrarInforme() { document.getElementById('pantalla-informe').style.display = 'none'; }
        
        function verDia(btn, dia) {
            document.querySelectorAll('.btn-dias button').forEach(b => b.style.background = '#f0f0f0');
            btn.style.background = '#0f0';
            document.getElementById('detalle-dia').innerHTML = `<b>RESUMEN ${dia.toUpperCase()}:</b><br>🏠 Ruta Cliente: ${dRuta.toFixed(1)}km ($${(dRuta*factor*PRECIO).toFixed(2)})<br>🚀 Mandado Extra: ${dExtra.toFixed(1)}km ($${(dExtra*factor*PRECIO).toFixed(2)})<br>⛽ Gastado: ${(fuelI-fuelR).toFixed(1)} Litros`;
        }
        function finalizarRuta() { alert("Día terminado. ¡Buen trabajo!"); location.reload(); }
    </script>
</body>
</html>
