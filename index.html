<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LucyRace - Moto App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Controles - Subidos para evitar el menú del móvil */
        .controls { 
            position: absolute; bottom: 80px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 15px;
            z-index: 1000; border: 2px solid #0f0; box-shadow: 0 0 15px #0f0;
        }

        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; font-weight: bold; }
        .stat-box { text-align: center; }
        .stat-val { display: block; font-size: 1.2em; color: #0f0; }

        button { 
            width: 100%; padding: 15px; border: none; border-radius: 10px; 
            font-size: 1.1em; font-weight: bold; cursor: pointer; text-transform: uppercase;
        }
        .btn-start { background: #0f0; color: #000; }
        .btn-pause { background: #ffae00; color: #000; display: none; }
        .btn-stop { background: #ff0000; color: #fff; display: none; margin-top: 10px; }
        
        #fuel-selector { margin-top: 10px; width: 100%; accent-color: #0f0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="controls">
        <div class="stats">
            <div class="stat-box">TIEMPO<span id="time" class="stat-val">00:00</span></div>
            <div class="stat-box">DISTANCIA<span id="dist" class="stat-val">0.0 km</span></div>
            <div class="stat-box">GASOLINA<span id="fuel" class="stat-val">-- L</span></div>
        </div>

        <div id="setup-area">
            <label>Litros en tanque: <span id="fuel-val">10</span>L</label>
            <input type="range" id="fuel-selector" min="1" max="20" value="10">
            <button class="btn-start" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>

        <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">EN ESPERA / PAUSA ⏳</button>
        <button id="stop-btn" class="btn-stop" onclick="finalizarRuta()">TERMINAR RUTA 🏁</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializar Mapa
        let map = L.map('map').setView([10.64, -71.61], 15); // Default, saltará con GPS
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let path = L.polyline([], {color: '#0f0', weight: 5}).addTo(map);
        let marker = L.marker([0,0]).addTo(map);

        // Variables de Lógica
        let totalDist = 0, segs = 0, timer, watchID;
        let rutaActiva = false, enPausa = false;
        let fuelInicial = 10;

        // Actualizar selector litros
        document.getElementById('fuel-selector').oninput = function() {
            fuelInicial = this.value;
            document.getElementById('fuel-val').innerText = this.value;
            document.getElementById('fuel').innerText = this.value + " L";
        };

        function iniciarRuta() {
            rutaActiva = true;
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'block';
            
            // Iniciar Cronómetro
            timer = setInterval(() => {
                if(!enPausa) {
                    segs++;
                    let m = Math.floor(segs/60).toString().padStart(2,'0');
                    let s = (segs%60).toString().padStart(2,'0');
                    document.getElementById('time').innerText = `${m}:${s}`;
                }
            }, 1000);

            // Activar GPS
            if(navigator.geolocation) {
                watchID = navigator.geolocation.watchPosition(pos => {
                    if(enPausa) return;
                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;
                    let newPos = [lat, lon];
                    
                    marker.setLatLng(newPos);
                    path.addLatLng(newPos);
                    map.setView(newPos);
                    
                    // Aquí luego calcularemos la distancia real
                }, err => alert("Activa el GPS, Amo"), {enableHighAccuracy: true});
            }
        }

        function pausarRuta() {
            enPausa = !enPausa;
            let btn = document.getElementById('pause-btn');
            btn.innerText = enPausa ? "REANUDAR RUTA ▶️" : "EN ESPERA / PAUSA ⏳";
            btn.style.background = enPausa ? "#0f0" : "#ffae00";
        }

        function finalizarRuta() {
            clearInterval(timer);
            navigator.geolocation.clearWatch(watchID);
            alert("Ruta terminada. ¡Buen trabajo!");
            location.reload(); // Reinicia para la siguiente
        }
    </script>
</body>
</html>
