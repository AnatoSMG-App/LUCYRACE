<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY ANATO V6.4 - MULTISERVICIOS ANATO SMG</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* PANELES SUPERIORES */
        .top-panels { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 1000; }
        .row-panels { display: flex; justify-content: space-between; gap: 8px; }
        .panel-data { background: rgba(0,0,0,0.9); border: 2px solid #0f0; border-radius: 12px; padding: 8px; flex: 1; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        
        /* COLORES SENSORES */
        .color-km { color: #ffeb3b !important; } 
        .color-gas { color: #ff9800 !important; } 
        .color-time { color: #00e5ff !important; } 
        .color-money { color: #00ff00 !important; }

        .val-big { font-size: 1.5em; font-weight: 900; line-height: 1; cursor: pointer; }
        .unit-small { font-size: 0.5em; color: #aaa; margin-left: 2px; }
        .txt-label { font-size: 0.6em; color: #aaa; text-transform: uppercase; font-weight: bold; }
        
        /* ALERTAS Y ANIMACIONES */
        @keyframes alert-red { 0% { background: #f00; } 50% { background: #300; } 100% { background: #f00; } }
        .fuel-alert { animation: alert-red 0.6s infinite !important; border-color: #fff !important; }
        
        @keyframes bounce-icon { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.2); } }
        .bouncing-icon { animation: bounce-icon 1s infinite; font-size: 30px; text-align: center; cursor: pointer; }

        /* PANEL EXTRA RAYO */
        #extra-float { position: absolute; top: 130px; left: 50%; transform: translateX(-50%); background: rgba(112, 0, 112, 0.95); border: 2px solid #f0f; padding: 8px; border-radius: 12px; display: none; z-index: 3000; width: 90%; text-align: center; box-shadow: 0 0 15px #f0f; }
        .extra-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 5px; font-size: 0.7em; font-weight: 900; }
        
        .side-hud { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .hud-btn { width: 55px; height: 55px; background: #111; border: 2px solid #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4em; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .bottom-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 94%; display: flex; gap: 10px; z-index: 1000; }
        .btn-main { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 900; font-size: 1em; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-rodar { background: #0f0; color: #000; }
        .btn-stop { background: #f00; color: #fff; }
        
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; padding: 15px; overflow-y: auto; box-sizing: border-box; }
        .card-hist { background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; margin-bottom: 10px; border-left: 4px solid #0f0; font-size: 0.85em; position: relative; }
        .card-extra-fix { background: rgba(255, 0, 255, 0.1); border: 1px solid #ff00ff; border-radius: 8px; padding: 8px; margin-top: 10px; }
        .barra-resumen { background: #1a1a1a; border: 1px solid #0f0; border-radius: 6px; padding: 8px; font-size: 0.75em; margin-bottom: 5px; position: relative; }
        .grid-4-jinetes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; text-align: center; margin-top: 5px; }

        .map-label { background: rgba(0,0,0,0.9); border: 2px solid #0f0; border-radius: 10px; padding: 8px; color: #fff; font-size: 12px; min-width: 120px; box-shadow: 0 0 10px #0f0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="extra-float">
        <span style="font-size: 0.8em; font-weight: 900; color: #fff;">⚡ MANIOBRA EXTRA</span>
        <div class="extra-grid">
            <div class="color-km" onclick="ajusteManual('extra-km')">🛣️<br><span id="ex-km">0.000</span></div>
            <div class="color-time">⏱️<br><span id="ex-time">00:00:00</span></div>
            <div class="color-gas">⛽<br><span id="ex-gas">00.00</span></div>
            <div class="color-money">💵<br>$<span id="ex-money">0.00</span></div>
        </div>
    </div>

    <div class="top-panels">
        <div class="row-panels">
            <div class="panel-data" style="border-color: #fff;">
                <span class="txt-label color-time">⏱️ <span id="val-time">00:00:00</span></span><br>
                <span class="val-big color-km" id="val-km" onclick="ajusteManual('km')">0.000<span class="unit-small">KM</span></span>
                <div style="display:flex; justify-content: space-between; margin-top:5px;">
                    <span id="val-gas-trip" class="color-gas" style="font-weight:bold; font-size:0.8em;">⛽ 00.00 L</span>
                    <span id="val-money-route" class="color-money" style="font-weight:bold; font-size:0.8em;">💵 $0.00</span>
                </div>
            </div>
            <div class="panel-data" id="panel-fuel" onclick="ajusteManual('gas')">
                <span class="txt-label">⛽ TANQUE LONCIN</span><br>
                <span class="val-big color-gas" id="val-fuel">15.00<span class="unit-small">L</span></span>
                <span id="val-money-total" class="color-money" style="font-size:0.7em; font-weight:bold;">💵 $0.00 Disp.</span>
            </div>
        </div>
    </div>

    <div class="side-hud">
        <div class="hud-btn" onclick="abrirHistorial()">📊</div>
        <div class="hud-btn" id="btn-extra" onclick="toggleExtra()" style="color:#f0f; border-color:#f0f;">⚡</div>
        <div class="hud-btn" onclick="abrirGPS()">📍</div>
        <div class="hud-btn" onclick="abrirCalibrar()">🔧</div>
        <div class="hud-btn" onclick="location.reload()" style="border-color:#f00;">🔄</div>
    </div>

    <div class="bottom-controls">
        <button id="btn-main" class="btn-main btn-rodar" onclick="controlRuta()">A RODAR 🏍️</button>
        <button id="btn-pause" class="btn-main" onclick="pausarRuta()" style="display:none; background:#ffae00; color:#000;">PAUSA ⏸</button>
    </div>

    <div id="pantalla-historial" class="full-modal">
        <h2 style="color:#0f0; border-bottom: 2px solid #0f0; text-align: center;">📊 REGISTROS ANATO</h2>
        <div id="contenedor-resumen"></div>
        <div id="lista-registros" style="margin-top: 15px;"></div>
        <button class="btn-main btn-stop" onclick="cerrarModales()" style="margin-top: 20px; width: 100%;">CERRAR</button>
    </div>

    <div id="modal-gps" class="full-modal">
        <h2 style="text-align: center;">📍 MARCAR DESTINO</h2>
        <input type="text" id="url-maps" placeholder="10.123, -67.123" style="width:100%; padding:15px; font-size:1.2em; background:#111; color:#fff; border:2px solid #0f0; border-radius: 10px;">
        <button class="btn-main btn-rodar" onclick="procesarUbicacion()">UBICAR EN MAPA</button>
        <button class="btn-main btn-stop" onclick="cerrarModales()">CANCELAR</button>
    </div>

    <div id="modal-calibrar" class="full-modal">
        <h2 style="text-align: center;">🔧 CALIBRACIÓN</h2>
        <input type="number" id="input-descuento-litros" value="1.0" step="0.1" style="width:100%; padding:20px; font-size:2em; background:#111; color:#0f0; border:2px solid #0f0; text-align:center; border-radius: 15px;">
        <button class="btn-main btn-rodar" onclick="calibrarYRestar()">DESCONTAR DEL TANQUE</button>
        <button class="btn-main btn-stop" onclick="cerrarModales()">CERRAR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', {zoomControl: false}).setView([10.174, -67.915], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let layerDestino = L.layerGroup().addTo(map);
        let marker = L.circleMarker([0,0], {radius: 9, color: '#fff', fillColor: '#0f0', fillOpacity: 1, weight: 3}).addTo(map);

        const iconAnato = L.divIcon({ html: '❄️', className: 'anato-home', iconSize: [30, 30] });
        L.marker([10.174, -67.915], {icon: iconAnato}).addTo(map).bindPopup("Multiservicios Anato SMG");

        let DB = JSON.parse(localStorage.getItem('lucy_v61_anato')) || {
            registros: [], factor: 0.05, fuel: 15.0,
            siete: {km:0, time:0, gas:0, money:0, inicio: new Date().toLocaleDateString()}, 
            quince: {km:0, time:0, gas:0, money:0, inicio: new Date().toLocaleDateString()}, 
            mes: {km:0, time:0, gas:0, money:0, inicio: new Date().toLocaleDateString()}
        };

        let estado = "parado", extraActivo = false, clienteActual = "Sin Cliente", equipoActual = "Servicio";
        let dTotal = 0, dExtra = 0, tTotal = 0, tExtra = 0, cronoMaestro, ultimaPos = null;

        const iconosEquipo = {
            "nevera": "❄️", "aire": "🌬️", "moto": "🏍️", "lavadora": "🌀", "casa": "🏠", "taller": "🔧"
        };

        function actualizarUI(){
            document.getElementById('val-km').innerHTML = dTotal.toFixed(3) + '<span class="unit-small">KM</span>';
            document.getElementById('val-time').innerText = formatTime(tTotal);
            document.getElementById('val-fuel').innerHTML = DB.fuel.toFixed(2) + '<span class="unit-small">L</span>';
            
            let consTotal = dTotal * DB.factor;
            document.getElementById('val-gas-trip').innerText = "⛽ " + consTotal.toFixed(2) + " L";
            document.getElementById('val-money-route').innerText = "💵 $" + (consTotal * 0.5).toFixed(2);
            document.getElementById('val-money-total').innerText = "💵 $" + (DB.fuel * 0.5).toFixed(2) + " Disp.";

            if(DB.fuel <= 4) document.getElementById('panel-fuel').classList.add('fuel-alert');
            else document.getElementById('panel-fuel').classList.remove('fuel-alert');

            if(extraActivo){
                document.getElementById('extra-float').style.display = 'block';
                document.getElementById('ex-km').innerText = dExtra.toFixed(3);
                document.getElementById('ex-time').innerText = formatTime(tExtra);
                let cEx = dExtra * DB.factor;
                document.getElementById('ex-gas').innerText = cEx.toFixed(2);
                document.getElementById('ex-money').innerText = (cEx * 0.5).toFixed(2);
            } else { document.getElementById('extra-float').style.display = 'none'; }
            
            localStorage.setItem('lucy_v61_anato', JSON.stringify(DB));
        }

        function pausarRuta() {
            if(estado === "rodando") {
                estado = "pausado";
                document.getElementById('btn-pause').innerText = "REANUDAR ▶️";
                equipoActual = prompt("🔧 ¿QUÉ EQUIPO REPARA? (Nevera, Aire, Moto, etc)", "Nevera") || "Servicio";
                clienteActual = prompt("👤 NOMBRE DEL CLIENTE:", "Sr. Juan") || "Sin Nombre";
                
                let iconEmoji = iconosEquipo[equipoActual.toLowerCase()] || "📍";
                let markerPos = marker.getLatLng();
                crearMarcadorCliente(markerPos.lat, markerPos.lng, clienteActual, equipoActual, iconEmoji, dTotal);
            } else {
                estado = "rodando";
                document.getElementById('btn-pause').innerText = "PAUSA ⏸";
            }
        }

        // ▼▼▼ MEJORA: ETIQUETAS INTERACTIVAS (CLICK Y PRESIÓN LARGA) ▼▼▼
        function crearMarcadorCliente(lat, lng, nombre, equipo, emoji, kmIda) {
            let kmVuelta = kmIda;
            let kmTotal = kmIda + kmVuelta;
            let gasS = kmTotal * DB.factor;
            let costS = gasS * 0.5;

            let customIcon = L.divIcon({
                html: `<div class="bouncing-icon">${emoji}</div><div style="color:#0f0; font-weight:900; text-shadow:2px 2px #000; font-size:10px; text-align:center;">${nombre}</div>`,
                className: 'custom-div-icon', iconSize: [50, 50]
            });

            let m = L.marker([lat, lng], {icon: customIcon}).addTo(layerDestino);

            let popCont = `
                <div class="map-label">
                    <b style="color:#0f0;">${emoji} ${nombre}</b><br>
                    🛠️ ${equipo}<br><hr>
                    🛣️ Ida: ${kmIda.toFixed(2)} km<br>
                    🔄 Vuelta: ${kmVuelta.toFixed(2)} km<br>
                    🚩 Total: ${kmTotal.toFixed(2)} km<br>
                    ⛽ Gas: ${gasS.toFixed(2)} L<br>
                    💵 Costo: $${costS.toFixed(2)}
                </div>`;
            m.bindPopup(popCont);

            let timer;
            m.on('mousedown touchstart', (e) => {
                timer = setTimeout(() => {
                    let op = prompt("⚙️ GESTIÓN DE ETIQUETA:\n1. Editar Nombre\n2. Eliminar Marcador\nEscribe el número:");
                    if(op === "1") {
                        let nuevo = prompt("Nuevo nombre:", nombre);
                        if(nuevo) { m.remove(); crearMarcadorCliente(lat, lng, nuevo, equipo, emoji, kmIda); }
                    } else if(op === "2") {
                        if(confirm("¿Borrar este marcador del mapa?")) m.remove();
                    }
                }, 3000); // 3 SEGUNDOS DE PRESIÓN LARGA
            });
            m.on('mouseup mouseleave touchend', () => clearTimeout(timer));
        }

        function controlRuta(){
            if(estado === "parado"){
                estado = "rodando";
                document.getElementById('btn-main').innerText = "FINALIZAR RUTA 🏁";
                document.getElementById('btn-main').className = "btn-main btn-stop";
                document.getElementById('btn-pause').style.display = "block";
                iniciarCronometro();
            } else { if(confirm("¿Cerrar ruta y guardar en registro?")){ finalizarYGuardar(); } }
        }

        // ▼▼▼ REPARACIÓN: SUMA UNIFICADA SIN MAQUILLAJE EN PANEL FRONTAL ▼▼▼
        function finalizarYGuardar(){
            // CALCULAMOS TOTALES REALES (CLIENTE + EXTRA)
            let totalKmReal = dTotal + dExtra; 
            let totalGasReal = totalKmReal * DB.factor;
            let totalMoneyReal = totalGasReal * 0.5;

            // ACTUALIZAR REGISTROS HISTÓRICOS
            ['siete', 'quince', 'mes'].forEach(per => {
                DB[per].km += totalKmReal;
                DB[per].gas += totalGasReal;
                DB[per].money += totalMoneyReal;
            });

            // GUARDAR FICHA DE LA RUTA
            DB.registros.unshift({
                cliente: clienteActual, equipo: equipoActual, fecha: new Date().toLocaleString(),
                km: dTotal.toFixed(3), 
                time: formatTime(tTotal), 
                gas: (dTotal * DB.factor).toFixed(2), 
                money: (dTotal * DB.factor * 0.5).toFixed(2),
                extra: { 
                    km: dExtra.toFixed(3), 
                    time: formatTime(tExtra), 
                    gas: (dExtra * DB.factor).toFixed(2), 
                    money: (dExtra * DB.factor * 0.5).toFixed(2) 
                }
            });
            resetTodo();
        }

        function resetTodo(){
            clearInterval(cronoMaestro); dTotal=0; tTotal=0; dExtra=0; tExtra=0; estado="parado"; extraActivo=false;
            document.getElementById('btn-main').innerText="A RODAR 🏍️";
            document.getElementById('btn-main').className="btn-main btn-rodar";
            document.getElementById('btn-pause').style.display="none";
            actualizarUI();
        }

        function iniciarCronometro(){
            if(cronoMaestro) clearInterval(cronoMaestro);
            cronoMaestro = setInterval(() => {
                if(estado === "rodando") {
                    tTotal++;
                    ['siete', 'quince', 'mes'].forEach(p => DB[p].time++);
                }
                if(extraActivo) {
                    tExtra++;
                    if(estado !== "rodando") {
                        ['siete', 'quince', 'mes'].forEach(p => DB[p].time++);
                    }
                }
                actualizarUI();
            }, 1000);
        }

        navigator.geolocation.watchPosition(pos => {
            let p = [pos.coords.latitude, pos.coords.longitude];
            marker.setLatLng(p);
            if(estado === "rodando" && ultimaPos){
                let dist = map.distance(ultimaPos, p) / 1000;
                if(dist > 0.002){
                    dTotal += dist;
                    if(extraActivo) dExtra += dist;
                    let consumoInst = dist * DB.factor;
                    DB.fuel -= consumoInst; 
                    actualizarUI();
                }
            }
            ultimaPos = p;
        }, null, {enableHighAccuracy:true});

        // ▼▼▼ REPARACIÓN: AJUSTE MANUAL SIN ENSUCIAR EL PANEL FRONTAL ▼▼▼
        function ajusteManual(tipo){
            let promptMsg = "";
            let defaultVal = 0;

            if(tipo === 'km') { promptMsg = "🛣️ AJUSTE MANUAL DE KM:"; defaultVal = dTotal; }
            else if(tipo === 'gas') { promptMsg = "⛽ LITROS EN TANQUE:"; defaultVal = DB.fuel; }
            else if(tipo === 'extra-km') { promptMsg = "⚡ KM EXTRA (MANUAL):"; defaultVal = dExtra; }

            let n = parseFloat(prompt(promptMsg, defaultVal));
            
            if(!isNaN(n)) { 
                if(tipo === 'km') {
                    let diferenciaKm = n - dTotal; 
                    if(diferenciaKm > 0) {
                        let consumoPrueba = diferenciaKm * DB.factor;
                        DB.fuel -= consumoPrueba; 
                    }
                    dTotal = n; 
                } 
                else if(tipo === 'extra-km') {
                    let diferenciaEx = n - dExtra;
                    if(diferenciaEx > 0) {
                        let consumoEx = diferenciaEx * DB.factor;
                        DB.fuel -= consumoEx; // DESCUENTO INMEDIATO DEL TANQUE
                        // NO SUMAMOS A dTotal AQUÍ PARA EVITAR EL MAQUILLAJE FRONTAL
                    }
                    dExtra = n;
                }
                else { DB.fuel = n; } 
            }
            actualizarUI();
        }

        function formatTime(s){
            let h = Math.floor(s / 3600);
            let m = Math.floor((s % 3600) / 60);
            let sec = s % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function abrirHistorial(){
            const titulos = { 'siete': '7 DÍAS', 'quince': '15 DÍAS', 'mes': '30 DÍAS' };
            document.getElementById('contenedor-resumen').innerHTML = ['siete', 'quince', 'mes'].map(p => `
                <div class="barra-resumen">
                    <span onclick="resetRango('${p}')" style="position:absolute; right:10px; top:8px; color:red; cursor:pointer; font-weight:bold; font-size:1.2em;">❌</span>
                    <b style="color:#fff;">RESUMEN ${titulos[p]}:</b><br>
                    <small style="color:#0f0;">Desde: ${DB[p].inicio || 'Inicio'}</small>
                    <div class="grid-4-jinetes">
                        <div class="color-km">🛣️<br>${DB[p].km.toFixed(3)}</div>
                        <div class="color-time">⏱️<br>${formatTime(DB[p].time)}</div>
                        <div class="color-gas">⛽<br>${DB[p].gas.toFixed(2)}</div>
                        <div class="color-money">💵<br>$${DB[p].money.toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('lista-registros').innerHTML = DB.registros.map((r, i) => `
                <div class="card-hist">
                    <span style="position:absolute; right:10px; top:10px; cursor:pointer;" onclick="borrarReg(${i})">🗑️</span>
                    <b class="color-money">${iconosEquipo[r.equipo.toLowerCase()] || '📍'} ${r.cliente}</b> <small style="color:#aaa;">${r.fecha}</small>
                    <div class="grid-4-jinetes">
                        <div class="color-km">🛣️<br>${r.km}</div>
                        <div class="color-time">⏱️<br>${r.time}</div>
                        <div class="color-gas">⛽<br>${r.gas}</div>
                        <div class="color-money">💵<br>$${r.money}</div>
                    </div>
                    <div class="card-extra-fix">
                        <b style="color:#f0f; font-size:0.8em;">⚡ MODO EXTRA (FIJO)</b>
                        <div class="grid-4-jinetes" style="font-size:0.9em;">
                            <div class="color-km">🛣️<br>${r.extra ? r.extra.km : '0.000'}</div>
                            <div class="color-time">⏱️<br>${r.extra ? r.extra.time : '00:00:00'}</div>
                            <div class="color-gas">⛽<br>${r.extra ? r.extra.gas : '0.00'}</div>
                            <div class="color-money">💵<br>$${r.extra ? r.extra.money : '0.00'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('pantalla-historial').style.display = 'block';
        }

        function resetRango(p) {
            if(confirm(`¿Desea poner en CERO el resumen?`)) {
                DB[p] = {km:0, time:0, gas:0, money:0, inicio: new Date().toLocaleDateString()};
                actualizarUI();
                abrirHistorial();
            }
        }

        function procesarUbicacion() {
            let input = document.getElementById('url-maps').value;
            let match = input.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
            if(match) {
                let lat = parseFloat(match[1]), lon = parseFloat(match[2]);
                layerDestino.clearLayers();
                L.marker([lat, lon]).addTo(layerDestino).bindPopup("DESTINO").openPopup();
                map.setView([lat, lon], 16);
                cerrarModales();
            }
        }

        function calibrarYRestar(){
            let val = parseFloat(document.getElementById('input-descuento-litros').value);
            if(!isNaN(val)) { DB.fuel -= val; actualizarUI(); }
            cerrarModales();
        }

        function borrarReg(i){ if(confirm("¿Borrar este registro?")){ DB.registros.splice(i,1); abrirHistorial(); } }
        function cerrarModales(){ document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none'); }
        function toggleExtra(){ extraActivo = !extraActivo; actualizarUI(); }
        function abrirGPS(){ document.getElementById('modal-gps').style.display = 'block'; }
        function abrirCalibrar(){ document.getElementById('modal-calibrar').style.display = 'block'; }

        actualizarUI();
    </script>
</body>
</html>
