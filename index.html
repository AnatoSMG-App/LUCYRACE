<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - V4.9 FIJO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #header { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        #header h1 { margin: 0; font-size: 1.8em; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        #tank-display-top { position: absolute; top: 5px; right: 15px; font-size: 5.5em; font-weight: 900; color: #0f0; z-index: 1001; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Estilo de etiqueta fija */
        .base-label { 
            background: #000 !important; 
            color: #0f0 !important; 
            border: 2px solid #0f0 !important; 
            font-weight: 900 !important; 
            font-size: 0.8em !important; 
            opacity: 1 !important;
        }

        .controls { position: absolute; bottom: 15px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 12px; border-radius: 25px; z-index: 1000; border: 2px solid #0f0; }
        .box-indicadores { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .reloj-btn { flex: 1; padding: 6px; border-radius: 15px; margin: 0 5px; text-align: center; border: 2px solid #555; }
        .reloj-cliente { border-color: #ffae00; color: #ffae00; }
        .reloj-extra { border-color: #ff00ea; color: #ff00ea; }
        .txt-mini { font-size: 0.6em; display: block; color: #ccc; }
        .txt-money { font-size: 1.2em; font-weight: 900; display: block; color: #fff; }
        
        .btn-start { background: #0f0; color: #000; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 1.1em; }
        #run-area { display: flex; flex-direction: column; gap: 8px; }
        .btn-pause { background: #ffae00; color: #000; padding: 12px; border-radius: 12px; font-weight: bold; }
        .btn-stop { background: #f00; color: #fff; padding: 10px; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header"><h1>LUCY JHA</h1></div>
    <div id="tank-display-top">10.0</div>
    <div id="map"></div>

    <div class="controls">
        <div class="box-indicadores">
            <div class="reloj-btn reloj-cliente">
                <span class="txt-mini">CLIENTE</span>
                <span id="c-km" style="font-weight:bold">0.00</span> km
                <span class="txt-money">$<span id="c-money">0.00</span></span>
            </div>
            <div class="reloj-btn reloj-extra">
                <span class="txt-mini">EXTRA</span>
                <span id="e-km" style="font-weight:bold">0.00</span> km
                <span class="txt-money">$<span id="e-money">0.00</span></span>
            </div>
        </div>

        <div id="setup-area">
            <button class="btn-start" onclick="iniciarRuta()">INICIAR GRABACIÓN 🚶‍♂️</button>
        </div>

        <div id="run-area" style="display:none;">
            <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">PONER MARCADOR / PAUSA 📍</button>
            <button class="btn-stop" onclick="location.reload()">FINALIZAR PRUEBA 🏁</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let markerUser = L.circleMarker([0,0], {radius: 7, color: '#00f2ff', fillColor: '#00f2ff', fillOpacity: 1}).addTo(map);
        let poly = L.polyline([], {color: '#0f0', weight: 5}).addTo(map);
        
        let dC = 0, dE = 0, grabando = false, baseAnclada = false, ultimaPos = null;

        // ESTO SE ACTIVA APENAS ABRES EL MAPA (Sin darle a rodar)
        navigator.geolocation.watchPosition(pos => {
            let latlng = [pos.coords.latitude, pos.coords.longitude];
            
            // 1. Anclaje automático de tu ubicación actual
            if(!baseAnclada) {
                L.marker(latlng).addTo(map)
                 .bindTooltip("MI UBICACIÓN ⚡", {permanent: true, direction: 'top', className: 'base-label'})
                 .openTooltip();
                map.setView(latlng, 17);
                baseAnclada = true;
            }

            // 2. Si estás grabando (caminando a la bodega)
            if(grabando && ultimaPos) {
                let d = getDist(ultimaPos, latlng);
                if(d > 0.002) { // Si te mueves más de 2 metros
                    dC += d;
                    poly.addLatLng(latlng);
                    actualizarUI();
                }
            }

            ultimaPos = latlng;
            markerUser.setLatLng(latlng);
        }, err => console.log(err), {enableHighAccuracy: true});

        function iniciarRuta() {
            grabando = true;
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('run-area').style.display = 'block';
            alert("Grabación iniciada. ¡Camina y verás la ruta!");
        }

        function pausarRuta() {
            let nombre = prompt("¿Qué hay aquí? (Ej: Bodega, Cliente)");
            if(nombre && ultimaPos) {
                L.marker(ultimaPos).addTo(map)
                 .bindTooltip(nombre.toUpperCase(), {permanent: true, direction: 'right', className: 'base-label'})
                 .openTooltip();
            }
        }

        function actualizarUI() {
            document.getElementById('c-km').innerText = dC.toFixed(2);
        }

        function getDist(p1, p2) {
            let R = 6371; 
            let dLat = (p2[0]-p1[0])*Math.PI/180;
            let dLon = (p2[1]-p1[1])*Math.PI/180;
            let a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(p1[0]*Math.PI/180)*Math.cos(p2[0]*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }
    </script>
</body>
</html>
