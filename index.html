<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - V5.0 ELECTROSHOCK</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* PANELES SUPERIORES AGRANDADOS */
        .top-panels { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; }
        .row-panels { display: flex; justify-content: space-between; gap: 8px; }
        .panel-data { background: rgba(0,0,0,0.9); border: 2px solid #0f0; border-radius: 15px; padding: 12px; flex: 1; box-shadow: 0 0 15px rgba(0,255,0,0.3); }
        
        .val-big { font-size: 1.8em; font-weight: 900; display: block; line-height: 1; }
        .unit-small { font-size: 0.5em; margin-left: 3px; color: #aaa; }
        .txt-label { font-size: 0.7em; font-weight: bold; color: #aaa; text-transform: uppercase; margin-bottom: 4px; display: block; }
        
        /* COLORES DE LOS JINETES */
        #val-km { color: #fff; }
        #val-time { color: #ffae00; font-size: 0.9em; }
        #val-gas-trip { color: #00ffff; }
        #val-money-route { color: #0f0; font-size: 1.4em; }

        /* ALERTA DE RESERVA PALPITANTE */
        @keyframes pulse-reserva { 0% { box-shadow: 0 0 5px #f00; border-color: #f00; } 50% { box-shadow: 0 0 30px #f00; border-color: #ff5555; } 100% { box-shadow: 0 0 5px #f00; border-color: #f00; } }
        .fuel-danger { animation: pulse-reserva 0.8s infinite; border-width: 3px; }
        .fuel-danger #val-fuel { color: #f00 !important; font-size: 2.2em; }

        /* CONTROLES LATERALES */
        .side-hud { position: absolute; right: 15px; bottom: 180px; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .hud-btn { width: 60px; height: 60px; background: #111; border: 2px solid #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5em; cursor: pointer; box-shadow: 0 5px 15px rgba(0,255,0,0.2); }
        .hud-btn:active { transform: scale(0.85); background: #0f0; }

        /* SLIDER DE GASOLINA */
        .slider-container { position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); width: 85%; z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        input[type=range] { width: 100%; accent-color: #0f0; }

        /* BOTONES PRINCIPALES */
        .bottom-controls { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; display: flex; gap: 10px; z-index: 1000; }
        .btn-main { flex: 1; padding: 22px; border-radius: 18px; border: none; font-weight: 900; font-size: 1.1em; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0,0,0,0.6); }
        .btn-rodar { background: #0f0; color: #000; }
        .btn-stop { background: #f00; color: #fff; }
        .btn-pause { background: #ffae00; color: #000; }

        /* MODALES */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; padding: 20px; box-sizing: border-box; }
        .modal-box { background: #111; border: 2px solid #0f0; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; margin: 10% auto; text-align: center; }
        input[type=text], input[type=number] { width: 100%; padding: 15px; background: #000; color: #0f0; border: 1px solid #333; border-radius: 12px; margin: 10px 0; font-size: 1.3em; text-align: center; }
        .card-hist { background: #1a1a1a; border-radius: 15px; padding: 15px; margin-bottom: 12px; border-left: 6px solid #0f0; text-align: left; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-panels">
        <div class="row-panels">
            <!-- JINETE 1 Y 2: RUTA -->
            <div class="panel-data" style="border-color: #fff;">
                <span class="txt-label">⏱️ <span id="val-time">00:00:00</span></span>
                <span class="val-big" id="val-km">0.000<span class="unit-small">KM</span></span>
                <div style="display:flex; justify-content: space-between; margin-top:10px;">
                    <span id="val-gas-trip" style="font-weight:bold;">0.00 L</span>
                    <span id="val-money-route" style="font-weight:900;">$0.00</span>
                </div>
            </div>
            <!-- JINETE 3 Y 4: TANQUE -->
            <div class="panel-data" id="panel-fuel">
                <span class="txt-label">⛽ TANQUE ACTUAL</span>
                <span class="val-big" id="val-fuel" style="color: #00ffff;">0.00<span class="unit-small">L</span></span>
                <span id="val-money-total" style="font-size:0.9em; color:#0f0; font-weight:bold;">$0.00 Disp.</span>
            </div>
        </div>
    </div>

    <div class="side-hud">
        <div class="hud-btn" onclick="abrirHistorial()">📊</div>
        <div class="hud-btn" onclick="pegarUbicacion()">📍</div>
        <div class="hud-btn" id="btn-extra" onclick="toggleExtra()">🚀</div>
        <div class="hud-btn" onclick="abrirCalibracion()" style="border-color:#ffae00">🔧</div>
    </div>

    <!-- SLIDER PARA AJUSTE RÁPIDO -->
    <div class="slider-container">
        <span class="txt-label" style="color:#0f0">Ajuste de Litros en Tanque</span>
        <input type="range" id="fuel-slider" min="0" max="15" step="0.1" value="10" oninput="updateFromSlider(this.value)">
        <div style="font-weight:bold; font-size:1.2em;" id="slider-val">10.0 L</div>
    </div>

    <div class="bottom-controls">
        <button id="btn-main" class="btn-main btn-rodar" onclick="controlRuta()">A RODAR LUCY ANATO 🏍️</button>
        <button id="btn-pause" class="btn-main btn-pause" onclick="pausarRuta()" style="display:none;">PAUSAR ⏸</button>
    </div>

    <!-- MODAL CALIBRAR -->
    <div id="modal-calibrar" class="full-modal">
        <div class="modal-box">
            <h3 style="color:#0f0">🔧 CALIBRAR CONSUMO</h3>
            <p>Distancia recorrida: <b id="km-cal-text" style="color:#fff">0.000</b> KM</p>
            <input type="number" id="input-gas-cal" placeholder="¿Cuántos litros gastaste?" step="0.01">
            <button class="btn-main btn-rodar" style="width:100%" onclick="guardarCalibracion()">APRENDER CONSUMO ⚡</button>
            <button onclick="cerrarModales()" style="background:none; color:#f00; border:none; margin-top:20px; font-weight:bold;">CANCELAR</button>
        </div>
    </div>

    <!-- MODAL HISTORIAL -->
    <div id="pantalla-historial" class="full-modal">
        <h2 style="color:#0f0; text-align:center;">RECORRIDOS DE HOY</h2>
        <div id="lista-historial"></div>
        <button onclick="cerrarHistorial()" style="background:#f00; color:#fff; border:none; padding:15px; border-radius:15px; width:100%; font-weight:900;">VOLVER AL MAPA</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', {zoomControl: false}).setView([10.174, -67.915], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let marker = L.circleMarker([0,0], {radius: 9, color: '#fff', fillColor: '#0f0', fillOpacity: 1, weight: 3}).addTo(map);
        
        let DB = JSON.parse(localStorage.getItem('lucy_data_v5')) || {
            registros: [], factor: 0.05, fuel: 10.0
        };

        let estado = "parado", extraActivo = false;
        let dTotal = 0, tTotal = 0, crono, ultimaPos = null;

        function actualizarUI(){
            document.getElementById('val-km').innerHTML = dTotal.toFixed(3) + '<span class="unit-small">KM</span>';
            document.getElementById('val-time').innerText = formatTime(tTotal);
            document.getElementById('val-fuel').innerHTML = DB.fuel.toFixed(2) + '<span class="unit-small">L</span>';
            
            let consumo = dTotal * DB.factor;
            document.getElementById('val-gas-trip').innerText = consumo.toFixed(2) + " L";
            document.getElementById('val-money-total').innerText = "$" + (DB.fuel * 0.5).toFixed(2) + " Disp.";
            document.getElementById('val-money-route').innerText = "$" + (consumo * 0.5).toFixed(2);
            
            // ALERTAS DE RESERVA
            const panel = document.getElementById('panel-fuel');
            if(DB.fuel <= 4) panel.classList.add('fuel-danger');
            else panel.classList.remove('fuel-danger');

            document.getElementById('fuel-slider').value = DB.fuel;
            document.getElementById('slider-val').innerText = DB.fuel.toFixed(1) + " L";
            
            localStorage.setItem('lucy_data_v5', JSON.stringify(DB));
        }

        function updateFromSlider(val){
            DB.fuel = parseFloat(val);
            actualizarUI();
        }

        navigator.geolocation.watchPosition(pos => {
            let p = [pos.coords.latitude, pos.coords.longitude];
            marker.setLatLng(p);
            map.panTo(p);
            if(estado === "rodando" && ultimaPos){
                let dist = map.distance(ultimaPos, p) / 1000;
                if(dist > 0.002){ 
                    dTotal += dist;
                    DB.fuel -= (dist * DB.factor);
                    actualizarUI();
                }
            }
            ultimaPos = p;
        }, null, {enableHighAccuracy:true});

        function controlRuta(){
            const btn = document.getElementById('btn-main');
            if(estado === "parado"){
                estado = "rodando";
                btn.innerText = "FINALIZAR JORNADA 🏁";
                btn.className = "btn-main btn-stop";
                document.getElementById('btn-pause').style.display = "block";
                crono = setInterval(() => { tTotal++; actualizarUI(); }, 1000);
            } else {
                if(confirm("¿Guardar ruta y resetear contadores?")){ 
                    finalizarYGuardar(); 
                }
            }
        }

        function finalizarYGuardar(){
            let reg = {
                fecha: new Date().toLocaleTimeString(),
                km: dTotal.toFixed(3),
                litros: (dTotal * DB.factor).toFixed(2),
                costo: (dTotal * DB.factor * 0.5).toFixed(2)
            };
            DB.registros.unshift(reg);
            localStorage.setItem('lucy_data_v5', JSON.stringify(DB));
            location.reload(); // Limpieza total
        }

        function pausarRuta(){
            if(estado === "rodando"){
                estado = "pausado";
                clearInterval(crono);
                document.getElementById('btn-pause').innerText = "REANUDAR ▶";
                let nom = prompt("Nombre del Cliente:");
                if(nom) L.marker(ultimaPos).addTo(map).bindPopup(nom).openPopup();
            } else {
                estado = "rodando";
                document.getElementById('btn-pause').innerText = "PAUSAR ⏸";
                crono = setInterval(() => { tTotal++; actualizarUI(); }, 1000);
            }
        }

        function toggleExtra(){
            extraActivo = !extraActivo;
            const btn = document.getElementById('btn-extra');
            btn.style.background = extraActivo ? '#ffae00' : '#111';
            btn.style.borderColor = extraActivo ? '#fff' : '#0f0';
            alert(extraActivo ? "MODO EXTRA: Mandado en curso 🚀" : "Modo normal");
        }

        function abrirCalibracion(){
            document.getElementById('km-cal-text').innerText = dTotal.toFixed(3);
            document.getElementById('modal-calibrar').style.display = 'block';
        }

        function guardarCalibracion(){
            let real = parseFloat(document.getElementById('input-gas-cal').value);
            if(real > 0 && dTotal > 0){
                DB.factor = real / dTotal;
                alert("¡Lucy Calibrada! Nuevo factor: " + DB.factor.toFixed(4));
                cerrarModales();
            }
        }

        function abrirHistorial(){
            const lista = document.getElementById('lista-historial');
            lista.innerHTML = DB.registros.map(r => `
                <div class="card-hist">
                    <b>🕒 ${r.fecha}</b><br>
                    <span style="color:#0f0; font-size:1.2em;">${r.km} KM | $${r.costo}</span>
                </div>
            `).join('') || "No hay rutas.";
            document.getElementById('pantalla-historial').style.display = 'block';
        }

        function cerrarHistorial(){ document.getElementById('pantalla-historial').style.display = 'none'; }
        function cerrarModales(){ document.querySelectorAll('.full-modal').forEach(m => m.style.display='none'); }
        function formatTime(s){ return new Date(s * 1000).toISOString().substr(11, 8); }
        function pegarUbicacion(){ prompt("Pega link de WhatsApp:"); }

        actualizarUI();
    </script>
</body>
</html>
