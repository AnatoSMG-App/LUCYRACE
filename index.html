<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - V3.0 PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        
        /* CABECERA: LUCY AL CENTRO, TANQUE DERECHA */
        #header { 
            position: absolute; top: 10px; width: 100%; display: flex; 
            justify-content: center; align-items: center; padding: 0 15px; 
            box-sizing: border-box; z-index: 1000; 
        }
        #header h1 { margin: 0; font-size: 1.6em; color: #0f0; text-shadow: 0 0 10px #0f0; text-align: center; position: absolute; width: 100%; left: 0; pointer-events: none; }
        #tank-display-top { font-size: 4.5em; font-weight: 900; color: #0f0; text-shadow: 0 0 20px #0f0; z-index: 1001; margin-left: auto; }

        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* CALIBRACIÓN */
        #calib-container { 
            position: absolute; top: 85px; left: 10px; z-index: 1000; 
            background: rgba(0,0,0,0.85); padding: 10px; border-radius: 15px; border: 2px solid #0f0; 
            display: flex; flex-direction: column; align-items: center; width: 85px;
        }
        #calib-container input { width: 60px; background: #000; color: #fff; border: 1px solid #0f0; font-size: 1.2em; text-align: center; border-radius: 5px; margin: 5px 0; }
        .btn-calib-ok { background: #0f0; color: #000; border: none; padding: 5px; border-radius: 5px; font-weight: bold; width: 100%; font-size: 0.7em; }

        .controls { 
            position: absolute; bottom: 15px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.95); padding: 15px; border-radius: 20px;
            z-index: 1000; border: 2px solid #0f0;
        }

        /* CONTADOR EXTRA ENCIMA DEL BOTÓN */
        #extra-info-box { 
            display: none; background: #ff00ea; color: #fff; padding: 8px; 
            border-radius: 12px; margin-bottom: 10px; text-align: center; font-weight: bold; font-size: 0.9em;
            border: 1px solid #fff;
        }

        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.65em; color: #0f0; font-weight: bold; text-transform: uppercase; }
        .stat-val { font-size: 1.2em; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        
        .btn-start { background: #0f0; color: #000; }
        .btn-pause { background: #ffae00; color: #000; display: none; flex: 2; }
        .btn-extra { background: #00fbff; color: #000; display: none; flex: 1.2; }
        .btn-stop { background: #ff0000; color: #fff; display: none; }
        .btn-informe { background: #fff; color: #000; margin-top: 10px; border: 2px solid #0f0; height: 50px; padding: 0;}

        #pantalla-informe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; color: #000; z-index: 2000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .btn-dias { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .btn-dias button { padding: 10px; background: #eee; font-size: 0.7em; color: #000; height: 50px; }
    </style>
</head>
<body>

    <div id="header">
        <h1>LUCY JHA</h1>
        <div id="tank-display-top">10.0</div>
    </div>

    <div id="calib-container">
        <span style="font-size: 0.55em; color:#0f0; font-weight:bold; text-align: center;">¿CON CUÁNTO LLEGASTE?</span>
        <input type="number" id="litros-llegada" value="0" step="0.1">
        <button class="btn-calib-ok" onclick="ejecutarCalibracion()">CALIBRAR</button>
    </div>
    
    <div id="pantalla-informe">
        <button onclick="cerrarInforme()" style="background:#000; color:#fff; width: auto; padding: 10px; margin-bottom: 10px;">⬅ VOLVER</button>
        <h2 style="text-align:center">HISTORIAL SEMANAL</h2>
        <div style="background:#f0f0f0; padding:15px; border-radius:15px; border-left: 10px solid #0f0; margin-bottom: 15px;">
            <p><b>ACUMULADO 7 DÍAS:</b><br><span id="inf-total">0.00 km | 0 L consumidos</span></p>
            <p id="detalle-dia" style="color: #666; font-style: italic;">Selecciona un día.</p>
        </div>
        <div class="btn-dias">
            <button onclick="verDia(this, 'Lunes')">LUN</button>
            <button onclick="verDia(this, 'Martes')">MAR</button>
            <button onclick="verDia(this, 'Miércoles')">MIE</button>
            <button onclick="verDia(this, 'Jueves')">JUE</button>
            <button onclick="verDia(this, 'Viernes')">VIE</button>
            <button onclick="verDia(this, 'Sábado')">SAB</button>
            <button onclick="verDia(this, 'Domingo')">DOM</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div id="extra-info-box">
            EXTRA: <span id="e-dist">0.00</span> km | <span id="e-time">00:00</span>
        </div>

        <div class="stats">
            <div class="stat-box"><span class="stat-label">TIEMPO RUTA</span><span id="time" class="stat-val">00:00</span></div>
            <div class="stat-box"><span class="stat-label">DISTANCIA RUTA</span><span id="dist" class="stat-val">0.00 km</span></div>
            <div class="stat-box"><span class="stat-label">TANQUE</span><span id="fuel-bottom" class="stat-val" style="color: #0f0;">10.0 L</span></div>
        </div>

        <div id="setup-area">
            <label style="display:block; text-align:center; font-weight:bold; margin-bottom: 5px;">CARGA INICIAL: <span id="fuel-val">10.0</span> L</label>
            <input type="range" id="fuel-slider" min="0" max="15" step="0.5" value="10" style="width:100%; accent-color:#0f0;">
            <button class="btn-start" style="margin-top:10px" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>

        <div class="btn-group">
            <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">PAUSA ⏳</button>
            <button id="extra-btn" class="btn-extra" onclick="activarExtra()">EXTRA 🚀</button>
        </div>
        <button id="stop-btn" class="btn-stop" onclick="finalizarRuta()">TERMINAR DÍA 🏁</button>
        <button class="btn-informe" onclick="abrirInforme()">VER INFORME SEMANAL 📊</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let path = L.polyline([], {color: '#00fbff', weight: 6}).addTo(map);
        let marker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#0f0', fillOpacity: 1}).addTo(map);

        let segs = 0, eSegs = 0, timer, watchID, lastPos = null;
        let distRuta = 0, distExtra = 0;
        let fuelI = 10, fuelR = 10, enP = false, enE = false;
        let factorConsumo = 0.05; // Por defecto

        document.getElementById('fuel-slider').oninput = function() {
            fuelI = parseFloat(this.value);
            fuelR = fuelI;
            actualizarUI();
        };

        function actualizarUI() {
            document.getElementById('fuel-val').innerText = fuelI.toFixed(1);
            document.getElementById('tank-display-top').innerText = fuelR.toFixed(1);
            document.getElementById('fuel-bottom').innerText = fuelR.toFixed(1) + " L";
        }

        function ejecutarCalibracion() {
            let litrosLlegada = parseFloat(document.getElementById('litros-llegada').value);
            let distTotal = distRuta + distExtra;
            if(distTotal <= 0) { alert("Primero debes rodar para poder calibrar."); return; }
            
            let gastadoReal = fuelI - litrosLlegada;
            factorConsumo = gastadoReal / distTotal;
            let kmL = 1 / factorConsumo;
            
            alert(`✅ CALIBRADO:\nConsumo: ${factorConsumo.toFixed(4)} L/km\nRendimiento: ${kmL.toFixed(2)} km por Litro.\nLucy ahora será exacta.`);
        }

        function iniciarRuta() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'block';
            document.getElementById('extra-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'block';
            
            timer = setInterval(() => {
                if(!enP) {
                    if(!enE) {
                        segs++;
                        document.getElementById('time').innerText = fmt(segs);
                    } else {
                        eSegs++;
                        document.getElementById('e-time').innerText = fmt(eSegs);
                    }
                }
            }, 1000);

            if(navigator.geolocation) {
                watchID = navigator.geolocation.watchPosition(pos => {
                    if(enP) return;
                    let lat = pos.coords.latitude, lon = pos.coords.longitude;
                    if(lastPos) {
                        let d = 0.02; // Simulación GPS
                        fuelR -= (d * factorConsumo);
                        if(!enE) { distRuta += d; document.getElementById('dist').innerText = distRuta.toFixed(2) + " km"; }
                        else { distExtra += d; document.getElementById('e-dist').innerText = distExtra.toFixed(2); }
                        actualizarUI();
                    }
                    lastPos = {lat, lon};
                    marker.setLatLng([lat, lon]);
                    path.addLatLng([lat, lon]);
                    map.panTo([lat, lon]);
                }, null, {enableHighAccuracy: true});
            }
        }

        function activarExtra() {
            enE = !enE;
            document.getElementById('extra-info-box').style.display = enE ? 'block' : 'none';
            document.getElementById('extra-btn').style.background = enE ? "#ff00ea" : "#00fbff";
            document.getElementById('extra-btn').innerText = enE ? "EXTRA ON" : "EXTRA 🚀";
        }

        function pausarRuta() {
            enP = !enP;
            if(enP && lastPos) {
                let n = prompt("Nombre del punto:");
                if(n) L.marker([lastPos.lat, lastPos.lon]).addTo(map).bindPopup(n).openPopup();
            }
            document.getElementById('pause-btn').innerText = enP ? "REANUDAR" : "PAUSA ⏳";
            document.getElementById('pause-btn').style.background = enP ? "#0f0" : "#ffae00";
        }

        function fmt(s) {
            return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0');
        }

        function verDia(btn, dia) {
            document.querySelectorAll('.btn-dias button').forEach(b => b.style.background = '#eee');
            btn.style.background = '#0f0';
            document.getElementById('detalle-dia').innerHTML = `<b>${dia.toUpperCase()}:</b><br>Ruta Cliente: ${distRuta.toFixed(2)} km<br>Ruta Extra: ${distExtra.toFixed(2)} km<br>Gasolina: ${(fuelI - fuelR).toFixed(1)} L`;
        }

        function finalizarRuta() { alert("Día finalizado. Datos guardados."); location.reload(); }
        function abrirInforme() { document.getElementById('pantalla-informe').style.display = 'block'; }
        function cerrarInforme() { document.getElementById('pantalla-informe').style.display = 'none'; }
    </script>
</body>
</html>
