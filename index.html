<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - MODO PROFESIONAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #header { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        #header h1 { margin: 0; font-size: 1.4em; color: #0f0; text-shadow: 0 0 10px #0f0; }
        #tank-display-top { position: absolute; top: 10px; right: 15px; font-size: 3.5em; font-weight: 900; color: #0f0; z-index: 1001; }
        
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* CONTROLES PRINCIPALES */
        .controls { position: absolute; bottom: 15px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 20px; z-index: 1000; border: 2px solid #0f0; }
        
        /* MINI CONTADORES SOBRE BOTONES */
        .mini-stats { display: flex; justify-content: space-around; font-size: 0.75em; margin-bottom: 5px; font-weight: bold; }
        .stats-cliente { color: #ffae00; }
        .stats-extra { color: #ff00ea; }

        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 15px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn-start { background: #0f0; color: #000; }
        .btn-pause { background: #ffae00; color: #000; }
        .btn-extra { background: #00fbff; color: #000; }
        .btn-stop { background: #ff0000; color: #fff; margin-top: 8px; }

        /* PANTALLA INFORME */
        #pantalla-informe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 2000; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .corte-card { padding: 10px; border-radius: 10px; margin-bottom: 8px; color: #fff; font-size: 0.8em; }
        .btn-dias { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .btn-dias button { padding: 10px; background: #eee; font-size: 0.7em; color: #000; border-radius: 8px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="header"><h1>LUCY JHA</h1></div>
    <div id="tank-display-top">10.0</div>

    <div id="pantalla-informe">
        <button onclick="cerrarInforme()" style="background:#000; color:#fff; width: auto; margin-bottom: 10px;">⬅ MAPA</button>
        <div class="corte-card" style="background: #28a745;"><b>7 DÍAS:</b> <span id="c7-txt">0 km | $0.00</span></div>
        <div class="corte-card" style="background: #17a2b8;"><b>15 DÍAS:</b> <span id="c15-txt">0 km | $0.00</span></div>
        
        <div id="detalle-dia" style="background:#fff3cd; padding:10px; border-radius:10px; font-size:0.85em; margin: 10px 0; border: 1px solid #ffeeba;">Toca un día abajo:</div>
        
        <div class="btn-dias">
            <button onclick="verDia(this, 'Lunes')">LUN</button>
            <button onclick="verDia(this, 'Martes')">MAR</button>
            <button onclick="verDia(this, 'Miércoles')">MIE</button>
            <button onclick="verDia(this, 'Jueves')">JUE</button>
            <button onclick="verDia(this, 'Viernes')">VIE</button>
            <button onclick="verDia(this, 'Sábado')">SAB</button>
            <button onclick="verDia(this, 'Domingo')">DOM</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="mini-stats">
            <div id="box-cliente" style="text-align: center; flex:1;">
                <div class="stats-cliente">Ruta: <span id="c-km">0.0</span>km | <span id="c-time">00:00</span></div>
                <div class="stats-cliente" style="font-size: 1.2em;">$<span id="c-money">0.00</span></div>
            </div>
            <div id="box-extra" style="text-align: center; flex:1; border-left: 1px solid #444;">
                <div class="stats-extra">Extra: <span id="e-km">0.0</span>km | <span id="e-time">00:00</span></div>
                <div class="stats-extra" style="font-size: 1.2em;">$<span id="e-money">0.00</span></div>
            </div>
        </div>

        <div id="setup-area">
            <input type="range" id="fuel-slider" min="0" max="15" step="0.5" value="10" style="width:100%;">
            <button class="btn-start" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>

        <div id="run-area" style="display:none;">
            <div class="btn-group">
                <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">PAUSA ⏳</button>
                <button id="extra-btn" class="btn-extra" onclick="activarExtra()">EXTRA 🚀</button>
            </div>
            <button class="btn-stop" onclick="finalizarRuta()">TERMINAR DÍA 🏁</button>
        </div>
        
        <button onclick="abrirInforme()" style="background:#fff; color:#000; margin-top:8px; height:40px; font-size:0.8em; border:1px solid #0f0; border-radius:10px;">HISTORIAL 📊</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let path = L.polyline([], {color: '#00fbff', weight: 5}).addTo(map);
        let marker = L.circleMarker([0,0], {radius: 6, color: '#fff', fillColor: '#0f0', fillOpacity: 1}).addTo(map);

        let segsC = 0, segsE = 0, timer, lastPos = null;
        let dRuta = 0, dExtra = 0, fuelI = 10, fuelR = 10, enP = false, enE = false;
        let factor = 0.05; const PRECIO = 0.50;

        document.getElementById('fuel-slider').oninput = function() { fuelI = fuelR = parseFloat(this.value); actualizarUI(); };

        function actualizarUI() {
            document.getElementById('tank-display-top').innerText = fuelR.toFixed(1);
            // Cliente
            document.getElementById('c-km').innerText = dRuta.toFixed(1);
            document.getElementById('c-money').innerText = (dRuta * factor * PRECIO).toFixed(2);
            // Extra
            document.getElementById('e-km').innerText = dExtra.toFixed(1);
            document.getElementById('e-money').innerText = (dExtra * factor * PRECIO).toFixed(2);
            
            // Totales Informe
            let tKm = dRuta + dExtra;
            document.getElementById('c7-txt').innerText = `${tKm.toFixed(1)} km | $${(tKm * factor * PRECIO).toFixed(2)}`;
        }

        function iniciarRuta() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('run-area').style.display = 'block';
            timer = setInterval(() => {
                if(!enP) {
                    if(!enE) { segsC++; document.getElementById('c-time').innerText = fmt(segsC); }
                    else { segsE++; document.getElementById('e-time').innerText = fmt(segsE); }
                }
            }, 1000);

            navigator.geolocation.watchPosition(pos => {
                if(enP) return;
                if(lastPos) {
                    let d = 0.02; // Simulado
                    fuelR -= (d * factor);
                    if(!enE) dRuta += d; else dExtra += d;
                    actualizarUI();
                }
                lastPos = {lat: pos.coords.latitude, lon: pos.coords.longitude};
                marker.setLatLng([lastPos.lat, lastPos.lon]);
                path.addLatLng([lastPos.lat, lastPos.lon]);
                map.panTo([lastPos.lat, lastPos.lon]);
            }, null, {enableHighAccuracy: true});
        }

        function activarExtra() {
            enE = !enE;
            document.getElementById('extra-btn').style.background = enE ? "#ff00ea" : "#00fbff";
            document.getElementById('extra-btn').innerText = enE ? "EXTRA ON" : "EXTRA 🚀";
        }

        function pausarRuta() { enP = !enP; document.getElementById('pause-btn').innerText = enP ? "CONTINUAR" : "PAUSA ⏳"; }
        function fmt(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }
        function abrirInforme() { document.getElementById('pantalla-informe').style.display = 'block'; }
        function cerrarInforme() { document.getElementById('pantalla-informe').style.display = 'none'; }
        
        function verDia(btn, dia) {
            document.querySelectorAll('.btn-dias button').forEach(b => b.style.background = '#eee');
            btn.style.background = '#0f0';
            document.getElementById('detalle-dia').innerHTML = `<b>DETALLE ${dia.toUpperCase()}:</b><br>🏠 Cliente: ${dRuta.toFixed(1)}km ($${(dRuta*factor*PRECIO).toFixed(2)})<br>🚀 Extra: ${dExtra.toFixed(1)}km ($${(dExtra*factor*PRECIO).toFixed(2)})<br>⛽ Total: ${(fuelI-fuelR).toFixed(1)} Litros`;
        }
        function finalizarRuta() { alert("Día finalizado exitosamente."); location.reload(); }
    </script>
</body>
</html>
