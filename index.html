<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY ANATO V5.9.2 - Protocolo Murachi</title>
    
    <!-- Leaflet para el Mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --neon-blue: #00d2ff;
            --dark-bg: #0a0b10;
            --panel-bg: rgba(20, 25, 35, 0.95);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--dark-bg);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        #map { height: 40%; width: 100%; border-bottom: 2px solid var(--neon-blue); }

        .dashboard {
            height: 60%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: var(--panel-bg);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--neon-blue);
            text-align: center;
        }

        .stat-card small { font-size: 0.7em; color: #aaa; text-transform: uppercase; }
        .stat-card div { font-size: 1.2em; font-weight: bold; margin-top: 5px; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-start { background: #2ecc71; color: white; }
        .btn-stop { background: #e74c3c; color: white; }
        .btn-calib { background: #34495e; color: white; }

        .acumuladores {
            margin-top: 10px;
            font-size: 0.85em;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            padding: 10px;
        }

        .status-bar {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            color: var(--neon-blue);
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="status-bar" id="gps-status">GPS: ESPERANDO...</div>

    <div class="dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <small>Distancia (KM)</small>
                <div id="val-km">0.000</div>
            </div>
            <div class="stat-card">
                <small>Tiempo</small>
                <div id="val-time">00:00:00</div>
            </div>
            <div class="stat-card">
                <small>Gasolina (L)</small>
                <div id="val-gas">0.000</div>
            </div>
            <div class="stat-card">
                <small>Costo Est. ($)</small>
                <div id="val-money">0.00</div>
            </div>
        </div>

        <div class="controls">
            <button id="btnAction" class="btn-start" onclick="toggleServicio()">Iniciar Viaje</button>
            <button class="btn-calib" onclick="abrirCalibracion()">⚙️ Calibrar</button>
        </div>

        <div class="acumuladores">
            <strong>📊 Resumen Acumulado (Protocolo Murachi)</strong>
            <div id="resumen-texto" style="margin-top:5px; line-height: 1.4;">
                Cargando historial...
            </div>
        </div>
    </div>

<script>
    // --- BASE DE DATOS INICIAL ---
    let DB = JSON.parse(localStorage.getItem('lucy_v59')) || {
        factor: 0.045, // Litros por KM (ajustable)
        registros: [],
        siete: { km: 0, time: 0, gas: 0, money: 0 },
        quince: { km: 0, time: 0, gas: 0, money: 0 },
        mes: { km: 0, time: 0, gas: 0, money: 0 }
    };

    // --- VARIABLES DE SESIÓN ---
    let activo = false;
    let map, path, ultimaPos;
    let dTotal = 0, tTotal = 0;
    let timerInterval, watchID;
    let clienteActual = "Cliente Genérico";

    // --- INICIALIZAR MAPA ---
    function initMap() {
        map = L.map('map').setView([10.165, -67.925], 15); // Centrado en Los Guayos
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        path = L.polyline([], {color: '#00d2ff', weight: 5}).addTo(map);
    }

    // --- LÓGICA DE SEGUIMIENTO ---
    function toggleServicio() {
        const btn = document.getElementById('btnAction');
        if (!activo) {
            // INICIAR
            activo = true;
            btn.innerText = "Finalizar Servicio";
            btn.className = "btn-stop";
            resetVariables();
            iniciarGPS();
            iniciarCronometro();
        } else {
            // FINALIZAR
            activo = false;
            btn.innerText = "Iniciar Viaje";
            btn.className = "btn-start";
            pararGPS();
            pararCronometro();
            finalizarYGuardar();
        }
    }

    function iniciarGPS() {
        if ("geolocation" in navigator) {
            watchID = navigator.geolocation.watchPosition(pos => {
                const p = [pos.coords.latitude, pos.coords.longitude];
                document.getElementById('gps-status').innerText = "GPS: SEÑAL OK";
                
                if (ultimaPos) {
                    let dist = map.distance(ultimaPos, p) / 1000;
                    if (dist > 0.02) { // Filtro 20 metros para evitar saltos detenido
                        dTotal += dist;
                        actualizarUI();
                    }
                }
                ultimaPos = p;
                path.addLatLng(p);
                map.panTo(p);
            }, err => {
                document.getElementById('gps-status').innerText = "ERROR GPS";
            }, { enableHighAccuracy: true });
        }
    }

    function iniciarCronometro() {
        let inicio = Date.now();
        timerInterval = setInterval(() => {
            tTotal = Math.floor((Date.now() - inicio) / 1000);
            document.getElementById('val-time').innerText = formatTime(tTotal);
        }, 1000);
    }

    // --- SOLDADURA DE DATOS (NÚCLEO V5.9.2) ---
    function finalizarYGuardar() {
        let gasUsada = dTotal * DB.factor;
        let dineroEst = gasUsada * 0.5; // Precio gasolina

        // 1. Guardar Registro Individual
        let nuevoReg = {
            fecha: new Date().toLocaleDateString(),
            km: dTotal.toFixed(2),
            gas: gasUsada.toFixed(2)
        };
        DB.registros.unshift(nuevoReg);

        // 2. Sincronizar Acumuladores Globales
        ['siete', 'quince', 'mes'].forEach(p => {
            DB[p].km += dTotal;
            DB[p].time += tTotal;
            DB[p].gas += gasUsada;
            DB[p].money += dineroEst;
        });

        saveDB();
        mostrarResumen();
        alert(`Servicio Guardado: ${dTotal.toFixed(2)} KM recorridos.`);
    }

    // --- FUNCIONES AUXILIARES ---
    function formatTime(s) {
        let h = Math.floor(s / 3600);
        let m = Math.floor((s % 3600) / 60);
        let sec = s % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function actualizarUI() {
        document.getElementById('val-km').innerText = dTotal.toFixed(3);
        document.getElementById('val-gas').innerText = (dTotal * DB.factor).toFixed(3);
        document.getElementById('val-money').innerText = (dTotal * DB.factor * 0.5).toFixed(2);
    }

    function mostrarResumen() {
        const r = DB.siete;
        document.getElementById('resumen-texto').innerHTML = `
            <b>Últimos 7 días:</b><br>
            Distancia: ${r.km.toFixed(1)} KM | Gas: ${r.gas.toFixed(1)} L<br>
            Tiempo Total: ${formatTime(r.time)}
        `;
    }

    function resetVariables() {
        dTotal = 0; tTotal = 0; ultimaPos = null;
        path.setLatLngs([]);
    }

    function pararGPS() { navigator.geolocation.clearWatch(watchID); }
    function pararCronometro() { clearInterval(timerInterval); }
    function saveDB() { localStorage.setItem('lucy_v59', JSON.stringify(DB)); }

    function abrirCalibracion() {
        let nuevoFactor = prompt("Factor de Consumo (L/KM):", DB.factor);
        if (nuevoFactor) {
            DB.factor = parseFloat(nuevoFactor);
            saveDB();
        }
    }

    window.onload = () => {
        initMap();
        mostrarResumen();
    };
</script>
</body>
</html>
