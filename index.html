<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - Salida 1</title>
    <style>
        /* Ajuste para evitar scroll y vista vertical */
        * { box-sizing: border-box; touch-action: manipulation; }
        body { 
            background-color: #000; color: #fff; font-family: sans-serif; 
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Cabecera */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; height: 15%; border-bottom: 1px solid #222; 
        }
        .calib-box { 
            width: 70px; height: 60px; border: 2px solid #555; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; 
        }
        .tanque-box { 
            font-size: 35px; color: #00ffcc; font-weight: bold; text-shadow: 0 0 10px #00ffcc; 
        }

        /* Mapa Central */
        #mapa { 
            flex-grow: 1; background: #0a0a0a; border: 1px solid #111; 
            display: flex; justify-content: center; align-items: center; position: relative; 
        }
        .linea-ruta { position: absolute; border: 1px dashed #00ffcc; width: 50%; height: 50%; opacity: 0.3; }

        /* Controles Inferiores */
        .controles { height: 20%; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        .row-controles { display: flex; justify-content: space-around; width: 100%; gap: 10px; }
        
        button { 
            flex: 1; padding: 15px; border-radius: 10px; border: none; 
            font-weight: bold; font-size: 14px; text-transform: uppercase; 
        }
        .btn-main { background: #00ffcc; color: #000; }
        .btn-extra { background: #ffcc00; color: #000; display: none; }
        .btn-info { background: #333; color: #fff; }
    </style>
</head>
<body>

    <header>
        <div id="btnCalibrar" class="calib-box" onmousedown="iniciarCalib()" onmouseup="pararCalib()">-</div>
        <div style="text-align: center;">
            <span style="color: #00ffcc; font-weight: bold; font-size: 12px;">LUCY JHA</span>
        </div>
        <div class="tanque-box">10.0</div>
    </header>

    <div id="mapa">
        <div class="linea-ruta"></div>
        <span style="color: #333;">[ MAPA NEGRO ACTIVO ]</span>
    </div>

    <div class="controles">
        <div class="row-controles">
            <button id="btnRodar" class="btn-main" onclick="toggleRodar()">Rodar</button>
            <button id="btnExtra" class="btn-extra" onclick="activarExtra()">Extra</button>
        </div>
        <div class="row-controles">
            <button class="btn-info" onclick="abrirInforme()">Informe 📊</button>
        </div>
    </div>

    <script>
        let rodando = false;
        let pausado = false;

        function toggleRodar() {
            const btn = document.getElementById('btnRodar');
            const btnEx = document.getElementById('btnExtra');
            
            if (!rodando) {
                rodando = true; btn.innerText = "Pausar";
            } else if (!pausado) {
                pausado = true; btn.innerText = "Reanudar"; btnEx.style.display = "block";
            } else {
                pausado = false; btn.innerText = "Pausar"; btnEx.style.display = "none";
            }
        }

        function abrirInforme() {
            const nombre = prompt("Finalizar ruta. ¿Nombre del cliente/casa?");
            if(nombre) alert("Ruta '" + nombre + "' guardada en Informe.");
        }

        function iniciarCalib() { /* Lógica de 3s */ }
        function pararCalib() { /* Lógica de 3s */ }
    </script>
</body>
</html>
