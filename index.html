<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - V4.7 RECTIFICADA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #header { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        #header h1 { margin: 0; font-size: 1.8em; color: #00f2ff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #0055ff; opacity: 1; }
        #tank-display-top { position: absolute; top: 5px; right: 15px; font-size: 4.0em; font-weight: 900; color: #0f0; z-index: 1001; line-height: 1; }
        #calib-container { position: absolute; top: 10px; left: 10px; z-index: 1005; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 12px; border: 1px solid rgba(0,255,0,0.3); width: 85px; text-align: center; }
        #calib-container span { font-size: 0.5em; color: #0f0; font-weight: bold; display: block; }
        #litros-llegada { width: 85%; background: #000; color: #fff; border: 1px solid #0f0; font-size: 1em; text-align: center; border-radius: 5px; margin: 4px 0; }
        .btn-calib { background: rgba(0,255,0,0.2); color: #0f0; border: 1px solid #0f0; padding: 3px; width: 100%; font-size: 0.6em; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .controls { position: absolute; bottom: 15px; left: 10px; right: 10px; background: rgba(0,0,0,0.95); padding: 12px; border-radius: 25px; z-index: 1000; border: 2px solid #0f0; }
        .box-indicadores { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .reloj-btn { flex: 1; padding: 6px; border-radius: 15px; margin: 0 5px; text-align: center; background: rgba(255,255,255,0.05); }
        .txt-mini { font-size: 0.55em; font-weight: bold; text-transform: uppercase; display: block; color: #ccc; }
        .txt-val { font-size: 0.8em; font-weight: bold; color: #fff; }
        .txt-money { font-size: 1.4em; font-weight: 900; display: block; color: #fff; }
        .txt-gas { font-size: 0.85em; color: #0f0; font-weight: 900; }
        button { width: 100%; padding: 16px; border: none; border-radius: 18px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        .btn-start { background: #0f0; color: #000; }
        .btn-pause { background: #ffae00; color: #000; }
        .btn-extra { background: #00fbff; color: #000; }
        .btn-stop { background: #ff0000; color: #fff; margin-top: 10px; height: 45px; font-size: 0.9em; }
        #pantalla-informe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 2000; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .card-informe { padding: 15px; border-radius: 15px; margin-bottom: 10px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header"><h1>LUCY JHA</h1></div>
    <div id="tank-display-top">10.0</div>
    <div id="calib-container">
        <span>LLEGADA (L)</span>
        <input type="number" id="litros-llegada" step="0.1" value="0">
        <button class="btn-calib" onclick="calibrar()">CALIBRAR</button>
    </div>
    <div id="pantalla-informe">
        <button onclick="cerrarInforme()" style="background:#000; color:#fff; width: auto; border-radius: 12px; padding: 10px 25px; margin-bottom:10px;">⬅ VOLVER</button>
        <div id="historial-contenido"></div>
    </div>
    <div id="map"></div>
    <div class="controls">
        <div class="box-indicadores">
            <div class="reloj-btn" style="border: 2px solid #ffae00;">
                <span class="txt-mini">Ruta Cliente</span>
                <span class="txt-val"><span id="c-time">00:00</span> | <span id="c-km">0.00</span>km</span>
                <span id="c-money" class="txt-money">$0.00</span>
                <span class="txt-gas"><span id="c-gas">0.0</span> L</span>
            </div>
            <div class="reloj-btn" style="border: 2px solid #ff00ea;">
                <span class="txt-mini">Extra</span>
                <span class="txt-val"><span id="e-time">00:00</span> | <span id="e-km">0.00</span>km</span>
                <span id="e-money" class="txt-money">$0.00</span>
                <span class="txt-gas"><span id="e-gas">0.0</span> L</span>
            </div>
        </div>
        <div id="setup-area">
            <input type="range" id="fuel-slider" min="1" max="15" step="0.1" value="10" style="width:100%; accent-color:#0f0;">
            <button class="btn-start" style="margin-top:12px" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>
        <div id="run-area" style="display:none;">
            <div style="display:flex; gap:10px;">
                <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">PAUSA ⏳</button>
                <button id="extra-btn" class="btn-extra" onclick="activarExtra()">EXTRA 🚀</button>
            </div>
            <button class="btn-stop" onclick="finalizarDía()">TERMINAR DÍA 🏁</button>
        </div>
        <button onclick="abrirInforme()" style="background:#fff; color:#000; margin-top:10px; height:45px; font-size:0.8em; border-radius:15px; font-weight:bold;">HISTORIAL 📊</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let marker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#00f2ff', fillOpacity: 1}).addTo(map);

        let tC=0, tE=0, timerC, timerE, dC=0, dE=0, fuelI=10, fuelR=10, enP=false, enE=false, calibrado=false;
        let factor = 0, PRECIO = 0.50, ultimaPos = null, poly, rutas = [];

        function getDist(p1, p2) {
            let R = 6371; let dLat = (p2[0]-p1[0])*Math.PI/180; let dLon = (p2[1]-p1[1])*Math.PI/180;
            let a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(p1[0]*Math.PI/180)*Math.cos(p2[0]*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        navigator.geolocation.watchPosition(pos => {
            let ll = [pos.coords.latitude, pos.coords.longitude];
            marker.setLatLng(ll); if(!ultimaPos) map.setView(ll, 18);
            if(ultimaPos && !enP && timerC) {
                let d = getDist(ultimaPos, ll);
                if(d > 0.002) { dC += d; if(enE) dE += d; poly.addLatLng(ll); }
            }
            ultimaPos = ll; actualizarUI();
        }, null, {enableHighAccuracy: true});

        function iniciarRuta() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('run-area').style.display = 'block';
            poly = L.polyline([], {color: '#0f0', weight: 4}).addTo(map);
            timerC = setInterval(() => { if(!enP) tC++; document.getElementById('c-time').innerText = fmt(tC); }, 1000);
            timerE = setInterval(() => { if(enE) tE++; document.getElementById('e-time').innerText = fmt(tE); }, 1000);
        }

        function calibrar() {
            let lleg = parseFloat(document.getElementById('litros-llegada').value);
            if(dC > 0) {
                factor = (fuelI - lleg) / (dC + dE);
                calibrado = true; fuelR = lleg;
                alert("Calibrado. Consumo calculado."); actualizarUI();
            }
        }

        function actualizarUI() {
            document.getElementById('tank-display-top').innerText = fuelR.toFixed(1);
            document.getElementById('c-km').innerText = dC.toFixed(2);
            document.getElementById('e-km').innerText = dE.toFixed(2);
            if(calibrado) {
                let gC = dC * factor; let gE = dE * factor;
                document.getElementById('c-gas').innerText = gC.toFixed(1);
                document.getElementById('e-gas').innerText = gE.toFixed(1);
                document.getElementById('c-money').innerText = "$" + (gC * PRECIO).toFixed(2);
                document.getElementById('e-money').innerText = "$" + (gE * PRECIO).toFixed(2);
            }
        }

        function pausarRuta() {
            enP = !enP; document.getElementById('pause-btn').innerText = enP ? "REANUDAR" : "PAUSA";
            if(enP) {
                let n = prompt("Nombre cliente:");
                if(n) { L.marker(ultimaPos).addTo(map).bindPopup(n).openPopup(); rutas.push({n, k: dC.toFixed(2)}); }
            }
        }

        function activarExtra() { enE = !enE; document.getElementById('extra-btn').innerText = enE ? "ON" : "EXTRA"; }
        function fmt(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }
        function abrirInforme() { document.getElementById('pantalla-informe').style.display = 'block'; }
        function cerrarInforme() { document.getElementById('pantalla-informe').style.display = 'none'; }
        function finalizarDía() { 
            let res = { fecha: new Date().toLocaleDateString(), km: dC, gas: (fuelI - fuelR) };
            localStorage.setItem('historial_lucy', JSON.stringify(res));
            location.reload(); 
        }
    </script>
</body>
</html>
