<style>
    /* Estilos para la nueva cabecera triple */
    #header-container {
        position: absolute;
        top: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px;
        z-index: 1000;
        background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .header-item { flex: 1; display: flex; justify-content: center; align-items: center; }

    /* Botón de calibración con estilo de marco */
    #calib-btn {
        width: 60px;
        height: 60px;
        border: 2px solid #555;
        border-radius: 12px;
        font-size: 2em;
        color: #555;
        background: rgba(0,0,0,0.5);
        transition: all 0.3s;
        user-select: none; /* Evita seleccionar texto al mantener presionado */
    }

    /* Nombre central */
    #header-container h1 {
        margin: 0;
        font-size: 1.5em;
        color: #0f0;
        text-shadow: 0 0 10px #0f0;
        white-space: nowrap;
    }

    /* Tanque neón grande a la derecha */
    #fuel-display {
        font-size: 2em;
        font-weight: bold;
        color: #0f0;
        text-shadow: 0 0 15px #0f0;
    }
</style>

<div id="header-container">
    <div class="header-item" style="justify-content: flex-start;">
        <button id="calib-btn" onmousedown="iniciarPresion()" onmouseup="cancelarPresion()" ontouchstart="iniciarPresion()" ontouchend="cancelarPresion()">-</button>
    </div>
    <div class="header-item">
        <h1>LUCY JHA</h1>
    </div>
    <div class="header-item" style="justify-content: flex-end;">
        <span id="fuel-display">10.0</span>
    </div>
</div>

<script>
    let tiempoPresionado;

    function iniciarPresion() {
        const btn = document.getElementById('calib-btn');
        btn.style.borderColor = "#0f0"; // Cambia a verde mientras presionas
        
        tiempoPresionado = setTimeout(() => {
            let nuevoNivel = prompt("CALIBRACIÓN: Ingrese los litros actuales en el tanque:");
            if (nuevoNivel !== null && !isNaN(nuevoNivel)) {
                fuelRestante = parseFloat(nuevoNivel);
                actualizarPantallaCombustible();
                alert("Calibración exitosa ✅");
            }
            btn.style.borderColor = "#555";
        }, 3000); // 3 segundos de espera
    }

    function cancelarPresion() {
        clearTimeout(tiempoPresionado);
        document.getElementById('calib-btn').style.borderColor = "#555";
    }

    function actualizarPantallaCombustible() {
        document.getElementById('fuel-display').innerText = fuelRestante.toFixed(1);
        // También actualizamos el valor en el resto de la app si es necesario
    }
</script>
