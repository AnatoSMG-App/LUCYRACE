<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - V5.2 FULL PRO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        
        /* CABECERA CORREGIDA */
        #header { position: absolute; top: 12px; left: 110px; z-index: 1000; pointer-events: none; }
        #header h1 { margin: 0; font-size: 1.1em; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; font-weight: 900; }
        #tank-display-top { position: absolute; top: 2px; right: 10px; font-size: 3.5em; font-weight: 900; color: #0f0; z-index: 1001; line-height: 1; }
        
        .palpitante { color: #f00 !important; animation: pulso 0.6s infinite; text-shadow: 0 0 20px #f00; }
        @keyframes pulso { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #calib-container { position: absolute; top: 5px; left: 5px; z-index: 1005; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 10px; border: 1px solid #0f0; width: 90px; text-align: center; }
        #calib-container span { font-size: 0.55em; color: #0f0; font-weight: bold; display: block; }
        #litros-llegada { width: 85%; background: #000; color: #fff; border: 1px solid #0f0; font-size: 1.1em; text-align: center; border-radius: 5px; margin: 4px 0; }
        .btn-calib { background: #0f0; color: #000; border: none; padding: 4px; width: 100%; font-weight: bold; border-radius: 5px; font-size: 0.65em; cursor: pointer; }

        #map { height: 100vh; width: 100vw; z-index: 1; }

        .controls { position: absolute; bottom: 15px; left: 10px; right: 10px; background: rgba(0,0,0,0.95); padding: 12px; border-radius: 25px; z-index: 1000; border: 2px solid #0f0; }
        .box-indicadores { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .reloj-btn { flex: 1; padding: 6px; border-radius: 15px; margin: 0 5px; text-align: center; background: rgba(255,255,255,0.05); border: 1.5px solid #555; }
        .reloj-cliente { border-color: #ffae00; color: #ffae00; }
        .reloj-extra { border-color: #ff00ea; color: #ff00ea; }
        
        .txt-mini { font-size: 0.55em; font-weight: bold; text-transform: uppercase; display: block; color: #ccc; }
        .txt-val { font-size: 0.8em; font-weight: bold; color: #fff; }
        .txt-money { font-size: 1.3em; font-weight: 900; display: block; color: #fff; }

        .btn-start { background: #0f0; color: #000; width: 100%; padding: 16px; border-radius: 18px; font-size: 1.2em; font-weight: bold; }
        .btn-pause { background: #ffae00; color: #000; width: 100%; padding: 14px; border-radius: 14px; font-weight: bold; margin-bottom: 8px; }
        .btn-stop { background: #ff0000; color: #fff; width: 100%; padding: 10px; border-radius: 12px; font-size: 0.9em; font-weight: bold; }

        /* PANTALLA INFORME RECUPERADA */
        #pantalla-informe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; z-index: 2000; display: none; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .card-informe { padding: 15px; border-radius: 15px; margin-bottom: 10px; color: #fff; font-weight: bold; }
        #detalle-dia { background: #fff3cd; padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid #ffeeba; font-size: 0.9em; line-height: 1.5; }
        .btn-semana { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-semana button { padding: 12px; background: #eee; font-size: 0.8em; color: #000; border-radius: 12px; border: 1px solid #ccc; height: 50px; }
        .base-label { background: #000 !important; color: #0f0 !important; border: 1.5px solid #0f0 !important; font-weight: bold !important; font-size: 0.75em !important; padding: 2px 5px !important; }
    </style>
</head>
<body>

    <div id="header"><h1>LUCY JHA</h1></div>
    <div id="tank-display-top">10.0</div>

    <div id="calib-container">
        <span>LLEGADA (L)</span>
        <input type="number" id="litros-llegada" step="0.1" value="0">
        <button class="btn-calib" onclick="calibrar()">CALIBRAR</button>
    </div>

    <div id="pantalla-informe">
        <button onclick="cerrarInforme()" style="background:#000; color:#fff; width: auto; border-radius: 12px; padding: 10px 25px; border:none;">⬅ VOLVER</button>
        <div class="card-informe" style="background: #28a745; margin-top:15px;">CORTE 7 DÍAS:<br><span id="c7-txt">0km | 0L | $0.00</span></div>
        <div class="card-informe" style="background: #17a2b8;">CORTE 15 DÍAS:<br><span id="c15-txt">0km | 0L | $0.00</span></div>
        <div class="card-informe" style="background: #6f42c1;">CORTE 30 DÍAS (MENSUAL):<br><span id="c30-txt">0km | 0L | $0.00</span></div>
        <div id="detalle-dia">Toca un día para ver el desglose completo.</div>
        <div class="btn-semana">
            <button onclick="verDia(this, 'Lunes')">LUN</button>
            <button onclick="verDia(this, 'Martes')">MAR</button>
            <button onclick="verDia(this, 'Miércoles')">MIE</button>
            <button onclick="verDia(this, 'Jueves')">JUE</button>
            <button onclick="verDia(this, 'Viernes')">VIE</button>
            <button onclick="verDia(this, 'Sábado')">SAB</button>
            <button onclick="verDia(this, 'Domingo')">DOM</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="box-indicadores">
            <div class="reloj-btn reloj-cliente">
                <span class="txt-mini">Ruta Cliente</span>
                <span class="txt-val"><span id="c-time">00:00</span> | <span id="c-km">0.00</span>km</span>
                <span class="txt-money">$<span id="c-money">0.00</span></span>
                <span class="txt-gas"><span id="c-gas">0.0</span> L</span>
            </div>
            <div class="reloj-btn reloj-extra">
                <span class="txt-mini">Extra</span>
                <span class="txt-val"><span id="e-time">00:00</span> | <span id="e-km">0.00</span>km</span>
                <span class="txt-money">$<span id="e-money">0.00</span></span>
            </div>
        </div>

        <div id="setup-area">
            <input type="range" id="fuel-slider" min="0" max="15" step="0.1" value="10" style="width:100%; accent-color:#0f0; margin-bottom:12px;">
            <button class="btn-start" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>

        <div id="run-area" style="display:none;">
            <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">MARCADOR / PAUSA 📍</button>
            <button class="btn-stop" onclick="location.reload()">TERMINAR DÍA 🏁</button>
        </div>
        <button onclick="abrirInforme()" style="background:#fff; color:#000; margin-top:10px; height:45px; font-size:0.9em; border-radius:15px; font-weight:bold; border:2px solid #0f0; width:100%;">HISTORIAL 📊</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let marker = L.circleMarker([0,0], {radius: 7, color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, weight: 2}).addTo(map);

        let tC = 0, tE = 0, timerC, timerE, dC = 0, dE = 0, fuelI = 10, fuelR = 10, grabando = false, calibrado = false, baseAnclada = false, enP = false;
        let factor = 0, PRECIO = 0.50, ultimaPos = null, poly;

        function getDist(p1, p2) {
            let R = 6371; 
            let dLat = (p2[0]-p1[0])*Math.PI/180;
            let dLon = (p2[1]-p1[1])*Math.PI/180;
            let a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(p1[0]*Math.PI/180)*Math.cos(p2[0]*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        document.getElementById('fuel-slider').oninput = function() { fuelI = fuelR = parseFloat(this.value); actualizarUI(); };

        navigator.geolocation.watchPosition(pos => {
            let ll = [pos.coords.latitude, pos.coords.longitude];
            if(!baseAnclada) {
                L.marker(ll).addTo(map).bindTooltip("MI UBICACIÓN ⚡", {permanent: true, direction: 'top', className: 'base-label'}).openTooltip();
                map.setView(ll, 17);
                baseAnclada = true;
            }
            if(grabando && !enP && ultimaPos) {
                let d = getDist(ultimaPos, ll);
                if(d > 0.002) { 
                    dC += d; 
                    poly.addLatLng(ll); 
                    if(calibrado) fuelR -= (d * factor);
                }
            }
            ultimaPos = ll; marker.setLatLng(ll); actualizarUI();
        }, null, {enableHighAccuracy: true});

        function iniciarRuta() {
            grabando = true;
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('run-area').style.display = 'block';
            poly = L.polyline([], {color: '#0f0', weight: 5}).addTo(map);
            timerC = setInterval(() => { if(!enP && grabando) { tC++; document.getElementById('c-time').innerText = fmt(tC); } }, 1000);
        }

        function calibrar() {
            let lleg = parseFloat(document.getElementById('litros-llegada').value);
            if(dC > 0) {
                factor = (fuelI - lleg) / dC;
                calibrado = true; fuelR = lleg;
                alert("Calibrado."); actualizarUI();
            }
        }

        function pausarRuta() {
            enP = !enP;
            document.getElementById('pause-btn').innerText = enP ? "REANUDAR RUTA ▶️" : "MARCADOR / PAUSA 📍";
            if(enP && ultimaPos) {
                let n = prompt("¿Qué lugar es este?");
                if(n) L.marker(ultimaPos).addTo(map).bindTooltip(n.toUpperCase(), {permanent: true, className: 'base-label'}).openTooltip();
            }
        }

        function fmt(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }
        function abrirInforme() { document.getElementById('pantalla-informe').style.display = 'block'; }
        function cerrarInforme() { document.getElementById('pantalla-informe').style.display = 'none'; }

        function verDia(btn, dia) {
            document.querySelectorAll('.btn-semana button').forEach(b => b.style.background = '#eee');
            btn.style.background = '#0f0';
            let gC = dC * (factor || 0.05);
            document.getElementById('detalle-dia').innerHTML = `<b>RESUMEN ${dia.toUpperCase()}</b><br>🏠 Cliente: ${dC.toFixed(2)}km | ${gC.toFixed(1)}L | $${(gC*PRECIO).toFixed(2)}<br>⛽ Total Gas: ${gC.toFixed(1)} L`;
        }

        function actualizarUI() {
            let display = document.getElementById('tank-display-top');
            display.innerText = fuelR.toFixed(1);
            if(fuelR <= 4.0) display.classList.add('palpitante'); else display.classList.remove('palpitante');
            document.getElementById('c-km').innerText = dC.toFixed(2);
            if(calibrado) {
                let gC = dC * factor;
                document.getElementById('c-gas').innerText = gC.toFixed(1);
                document.getElementById('c-money').innerText = (gC * PRECIO).toFixed(2);
            }
        }
    </script>
</body>
</html>
