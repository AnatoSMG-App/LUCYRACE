<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCY JH - Control de Ruta</title>
    <style>
        /* Estilos generales con toques neón */
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #1e1e1e; }
        
        /* Cuadros Superiores */
        .box { width: 80px; height: 50px; background: #2a2a2a; border: 2px solid #00ffcc; text-align: center; border-radius: 8px; }
        .calib-box { border-color: #555; color: #888; transition: 0.3s; }
        .active-calib { border-color: #00ffcc; color: white; }
        
        /* Centro: Mapa (Simulado) */
        #mapa { flex-grow: 1; background: #222; display: flex; justify-content: center; align-items: center; border: 1px solid #333; margin: 5px; position: relative; }
        
        /* Alerta Roja */
        .reserva { color: #ff3333 !important; border-color: #ff3333 !important; animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 50% { opacity: 0.5; } }

        /* Menú Inferior */
        nav { display: flex; justify-content: space-around; padding: 15px; background: #1e1e1e; }
        .btn-nav { background: #333; border: none; color: white; padding: 10px; border-radius: 5px; width: 30%; }
    </style>
</head>
<body>

    <header>
        <div id="btnResta" class="box calib-box" onmousedown="iniciarPresion()" onmouseup="cancelarPresion()">-</div>
        <h2 style="color: #00ffcc;">LUCY JH</h2>
        <input type="number" id="tanque" class="box" placeholder="Litros" step="0.01">
    </header>

    <div id="mapa">
        <p id="statusGPS">Esperando GPS... 🛰️</p>
    </div>

    <nav>
        <button class="btn-nav">Tiempo ⏱️</button>
        <button class="btn-nav">Distancia 📏</button>
        <button class="btn-nav" onclick="abrirInforme()">Informe 📊</button>
    </nav>

    <script>
        let timer;
        let calibrado = false;

        // Lógica del candado de 3 segundos
        function iniciarPresion() {
            timer = setTimeout(() => {
                const box = document.getElementById('btnResta');
                box.classList.add('active-calib');
                let valor = prompt("Introduce litros actuales para calibrar:");
                if(valor) box.innerText = valor;
            }, 3000);
        }

        function cancelarPresion() { clearTimeout(timer); }

        function abrirInforme() {
            alert("Abriendo pantalla de Informes: 7, 15 y 30 días...");
        }

        // Simulación de alerta roja
        setInterval(() => {
            let litros = parseFloat(document.getElementById('tanque').value);
            if (litros < 2) {
                document.getElementById('tanque').classList.add('reserva');
            } else {
                document.getElementById('tanque').classList.remove('reserva');
            }
        }, 1000);
    </script>
</body>
</html>
