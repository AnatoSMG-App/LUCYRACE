<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY ANATO V6.0 - CISNE DE ORO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .top-panels { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 1000; }
        .row-panels { display: flex; justify-content: space-between; gap: 8px; }
        .panel-data { background: rgba(0,0,0,0.9); border: 2px solid #0f0; border-radius: 12px; padding: 8px; flex: 1; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        
        @keyframes bounce-in { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.1); } 70% { transform: scale(0.9); } 100% { transform: scale(1); opacity: 1; } }
        .animated-icon { animation: bounce-in 0.6s ease-out; }
        @keyframes alert-fuel-red { 0% { background: #f00; } 50% { background: #600; } 100% { background: #f00; } }
        .fuel-alert { animation: alert-fuel-red 0.5s infinite !important; border-color: #fff !important; }
        
        .color-km { color: #ffeb3b !important; }
        .color-gas { color: #ff9800 !important; }
        .color-time { color: #00e5ff !important; }
        .color-money { color: #00ff00 !important; }

        .val-big { font-size: 1.5em; font-weight: 900; line-height: 1; }
        .unit-small { font-size: 0.5em; color: #aaa; margin-left: 2px; }
        .txt-label { font-size: 0.6em; color: #aaa; text-transform: uppercase; font-weight: bold; }
        
        #extra-float { position: absolute; top: 130px; left: 50%; transform: translateX(-50%); background: rgba(112, 0, 112, 0.95); border: 2px solid #f0f; padding: 8px; border-radius: 12px; display: none; z-index: 3000; width: 90%; text-align: center; box-shadow: 0 0 15px #f0f; }
        .extra-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 5px; font-size: 0.7em; font-weight: 900; }
        
        .side-hud { position: absolute; right: 10px; bottom: 120px; display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .hud-btn { width: 55px; height: 55px; background: #111; border: 2px solid #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4em; cursor: pointer; }
        
        .bottom-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 94%; display: flex; gap: 10px; z-index: 1000; }
        .btn-main { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 900; font-size: 1em; cursor: pointer; text-transform: uppercase; }
        .btn-rodar { background: #0f0; color: #000; }
        .btn-stop { background: #f00; color: #fff; }
        
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; padding: 15px; overflow-y: auto; box-sizing: border-box; }
        .card-hist { background: #111; border: 1px solid #333; border-radius: 10px; padding: 10px; margin-bottom: 10px; border-left: 4px solid #0f0; font-size: 0.9em; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="extra-float">
        <span style="font-size: 0.8em; font-weight: 900; color: #fff;">⚡ EXTRA: <span id="ex-nombre">MANIOBRA</span></span>
        <div class="extra-grid">
            <div class="color-km">🛣️<br><span id="ex-km">0.000</span></div>
            <div class="color-time">⏱️<br><span id="ex-time">00:00:00</span></div>
            <div class="color-gas">⛽<br><span id="ex-gas">0.00</span></div>
            <div class="color-money">💵<br>$<span id="ex-money">0.00</span></div>
        </div>
    </div>

    <div class="top-panels">
        <div class="row-panels">
            <div class="panel-data" style="border-color: #fff;">
                <span class="txt-label color-time">⏱️ <span id="val-time">00:00:00</span></span><br>
                <span class="val-big color-km" id="val-km">0.000<span class="unit-small">KM</span></span>
                <div style="display:flex; justify-content: space-between; margin-top:5px;">
                    <span id="val-gas-trip" class="color-gas" style="font-weight:bold; font-size:0.8em;">⛽ 0.00 L</span>
                    <span id="val-money-route" class="color-money" style="font-weight:bold; font-size:0.8em;">💵 $0.00</span>
                </div>
            </div>
            <div class="panel-data" id="panel-fuel" onclick="abrirFuelModal()">
                <span class="txt-label">⛽ TANQUE</span><br>
                <span class="val-big color-gas" id="val-fuel">00.00<span class="unit-small">L</span></span>
                <span id="val-money-total" class="color-money" style="font-size:0.7em; font-weight:bold;">💵 $0.00 Disp.</span>
            </div>
        </div>
    </div>

    <div class="side-hud">
        <div class="hud-btn" onclick="abrirHistorial()">📊</div>
        <div class="hud-btn" id="btn-extra" onclick="toggleExtra()">⚡</div>
        <div class="hud-btn" onclick="abrirGPS()">📍</div>
        <div class="hud-btn" onclick="abrirCalibrar()">🔧</div>
        <div class="hud-btn" onclick="location.reload()" style="border-color:#f00;">🔄</div>
    </div>

    <div class="bottom-controls">
        <button id="btn-main" class="btn-main btn-rodar" onclick="controlRuta()">A RODAR 🏍️</button>
        <button id="btn-pause" class="btn-main" onclick="pausarRuta()" style="display:none; background:#ffae00; color:#000;">PAUSA ⏸</button>
    </div>

    <div id="pantalla-historial" class="full-modal">
        <h2 style="color:#0f0;">📊 REGISTRO ANATO</h2>
        <div id="lista-registros"></div>
        <button class="btn-main btn-stop" onclick="cerrarModales()">CERRAR</button>
    </div>

    <div id="modal-gps" class="full-modal">
        <h2>📍 UBICACIÓN WHATSAPP</h2>
        <input type="text" id="url-maps" placeholder="Pegar Coordenadas (lat,lon)" style="width:100%; padding:20px; font-size:1.2em;">
        <button class="btn-main btn-rodar" onclick="procesarUbicacion()">TRAZAR RUTA</button>
        <button class="btn-main btn-stop" onclick="cerrarModales()">CANCELAR</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', {zoomControl: false}).setView([10.174, -67.915], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let layerTrayectoria = L.polyline([], {color: '#000', weight: 4}).addTo(map);
        let layerIconos = L.layerGroup().addTo(map);
        let markerYo = L.marker([0,0], {icon: L.divIcon({className: 'animated-icon', html: '❄️', iconSize: [30,30]})}).addTo(map).bindTooltip("Multiservicio Anato SMG");

        let DB = JSON.parse(localStorage.getItem('lucy_v60_final')) || {
            registros: [], factor: 0.05, fuel: 14.00,
            siete: {km:0, time:0, gas:0, money:0}, quince: {km:0, time:0, gas:0, money:0}, mes: {km:0, time:0, gas:0, money:0}
        };

        let estado = "parado", extraActivo = false;
        let dTotal = 0, dExtra = 0, tTotal = 0, tExtra = 0, cronoMaestro, ultimaPos = null, miPos = null;

        const iconosLib = {
            "nevera": "🧊", "freezer": "🧊", "aire": "❄️", "split": "❄️",
            "moto": "🏍️", "carro": "🚗", "auto": "🚗", "tienda": "🏪",
            "electrónica": "⚡", "casa": "🏠", "taller": "🧰", "lavadora": "🧺"
        };

        function actualizarUI(){
            document.getElementById('val-km').innerHTML = dTotal.toFixed(3) + '<span class="unit-small">KM</span>';
            document.getElementById('val-time').innerText = formatTime(tTotal);
            document.getElementById('val-fuel').innerHTML = DB.fuel.toFixed(2) + '<span class="unit-small">L</span>';
            
            let cTotal = dTotal * DB.factor;
            document.getElementById('val-gas-trip').innerText = "⛽ " + cTotal.toFixed(2) + " L";
            document.getElementById('val-money-route').innerText = "💵 $" + (cTotal * 0.5).toFixed(2);
            document.getElementById('val-money-total').innerText = "💵 $" + (DB.fuel * 0.5).toFixed(2) + " Disp.";

            if(DB.fuel < 4.0) document.getElementById('panel-fuel').classList.add('fuel-alert');
            else document.getElementById('panel-fuel').classList.remove('fuel-alert');

            if(extraActivo){
                document.getElementById('extra-float').style.display = 'block';
                document.getElementById('ex-km').innerText = dExtra.toFixed(3);
                document.getElementById('ex-time').innerText = formatTime(tExtra);
                let cE = dExtra * DB.factor;
                document.getElementById('ex-gas').innerText = cE.toFixed(2);
                document.getElementById('ex-money').innerText = (cE * 0.5).toFixed(2);
            } else document.getElementById('extra-float').style.display = 'none';
            
            localStorage.setItem('lucy_v60_final', JSON.stringify(DB));
        }

        function pausarRuta() {
            if(estado === "rodando") {
                estado = "pausado";
                document.getElementById('btn-pause').innerText = "REANUDAR ▶️";
                let eq = prompt("EQUIPO (Nevera, Aire, Moto...):", "Nevera").toLowerCase();
                let cli = prompt("NOMBRE CLIENTE:", "Nuevo Cliente");
                
                let icon = "📍";
                for(let key in iconosLib) { if(eq.includes(key)) icon = iconosLib[key]; }

                let marker = L.marker(miPos, {
                    icon: L.divIcon({className: 'animated-icon', html: `<div style="font-size:25px;">${icon}</div>`, iconSize:[30,30]})
                }).addTo(layerIconos).bindPopup(`<b>${eq.toUpperCase()}</b><br>${cli}`);
                
                // Borrado de 3 segundos
                let t;
                marker.on('mousedown', () => t = setTimeout(() => layerIconos.removeLayer(marker), 3000));
                marker.on('mouseup', () => clearTimeout(t));

            } else {
                estado = "rodando";
                document.getElementById('btn-pause').innerText = "PAUSA ⏸";
            }
        }

        function procesarUbicacion() {
            let inp = document.getElementById('url-maps').value;
            let m = inp.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
            if(m && miPos) {
                let lat = parseFloat(m[1]), lon = parseFloat(m[2]);
                let dest = [lat, lon];
                layerTrayectoria.setLatLngs([miPos, dest]);
                let dist = (map.distance(miPos, dest) / 1000) * 2; // Ida y Vuelta
                let gas = dist * DB.factor;
                
                L.marker(dest).addTo(layerIconos).bindPopup(`
                    <b>DESTINO CLIENTE</b><br>
                    Distancia: ${dist.toFixed(2)} km (I/V)<br>
                    Gasto: ${gas.toFixed(2)}L | $${(gas*0.5).toFixed(2)}
                `).openPopup();
                
                map.fitBounds([miPos, dest]);
                cerrarModales();
            }
        }

        function controlRuta(){
            if(estado === "parado"){
                estado = "rodando";
                document.getElementById('btn-main').innerText = "FINALIZAR 🏁";
                document.getElementById('btn-main').className = "btn-main btn-stop";
                document.getElementById('btn-pause').style.display = "block";
                iniciarCronometro();
            } else { location.reload(); }
        }

        function iniciarCronometro(){
            cronoMaestro = setInterval(() => {
                if(estado === "rodando") tTotal++;
                if(extraActivo) tExtra++;
                actualizarUI();
            }, 1000);
        }

        navigator.geolocation.watchPosition(pos => {
            miPos = [pos.coords.latitude, pos.coords.longitude];
            markerYo.setLatLng(miPos);
            if(estado === "rodando" && ultimaPos){
                let d = map.distance(ultimaPos, miPos) / 1000;
                if(d > 0.001){
                    dTotal += d;
                    if(extraActivo) dExtra += d;
                    DB.fuel -= (d * DB.factor);
                }
            }
            ultimaPos = miPos;
        }, null, {enableHighAccuracy:true});

        function formatTime(s){
            let h = Math.floor(s / 3600);
            let m = Math.floor((s % 3600) / 60);
            let sec = s % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        function abrirGPS(){ document.getElementById('modal-gps').style.display='block'; }
        function cerrarModales(){ document.querySelectorAll('.full-modal').forEach(m => m.style.display = 'none'); }
        function toggleExtra(){ extraActivo = !extraActivo; actualizarUI(); }
        actualizarUI();
    </script>
</body>
</html>
