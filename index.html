<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - MODO CRIOLLO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        
        /* CABECERA CENTRADA - ESTILO FINAL */
        #header { 
            position: absolute; top: 10px; width: 100%; display: flex; 
            justify-content: center; align-items: center; padding: 0 15px; 
            box-sizing: border-box; z-index: 1000; 
        }
        #header h1 { margin: 0; font-size: 1.6em; color: #0f0; text-shadow: 0 0 10px #0f0; position: absolute; width: 100%; text-align: center; }
        
        /* TANQUE GIGANTE CON ALERTA ROJA */
        #tank-display-top { 
            font-size: 4.5em; font-weight: 900; color: #0f0; text-shadow: 0 0 20px #0f0; 
            margin-left: auto; z-index: 1001; transition: 0.3s;
        }
        
        /* LA ALERTA QUE ME PEDISTE */
        .alerta-roja { 
            color: #ff0000 !important; 
            text-shadow: 0 0 30px #ff0000, 0 0 10px #fff !important; 
            animation: sacudida 0.5s infinite; 
        }

        @keyframes sacudida {
            0% { transform: translate(0,0); }
            25% { transform: translate(2px,2px); }
            50% { transform: translate(-2px,2px); }
            75% { transform: translate(2px,-2px); }
            100% { transform: translate(0,0); }
        }

        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* CALIBRACIÓN */
        #calib-container { 
            position: absolute; top: 85px; left: 10px; z-index: 1000; 
            background: rgba(0,0,0,0.85); padding: 10px; border-radius: 15px; border: 2px solid #0f0; 
            display: flex; flex-direction: column; align-items: center; width: 90px;
        }
        #calib-container input { width: 65px; background: #000; color: #fff; border: 1px solid #0f0; font-size: 1.2em; text-align: center; border-radius: 5px; margin: 5px 0; }

        /* INFORME - HISTORIAL DE CONSUMO */
        #pantalla-informe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; color: #000; z-index: 2000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .corte-card { padding: 15px; border-radius: 15px; margin-bottom: 10px; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }

        .controls { 
            position: absolute; bottom: 15px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.95); padding: 15px; border-radius: 20px;
            z-index: 1000; border: 2px solid #0f0;
        }

        #extra-info-box { 
            display: none; background: #ff00ea; color: #fff; padding: 8px; 
            border-radius: 12px; margin-bottom: 10px; text-align: center; font-weight: bold; border: 1px solid #fff;
        }

        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .stat-val { font-size: 1.2em; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
        
        .btn-start { background: #0f0; color: #000; }
        .btn-extra { background: #00fbff; color: #000; display: none; flex: 1.2; }
        .btn-informe { background: #fff; color: #000; margin-top: 10px; border: 2px solid #0f0; height: 50px; font-size: 0.9em; }

        .btn-dias { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .btn-dias button { padding: 10px; background: #eee; font-size: 0.7em; color: #000; height: 45px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="header">
        <h1>LUCY JHA</h1>
        <div id="tank-display-top">10.0</div>
    </div>

    <div id="calib-container">
        <span style="font-size: 0.5em; color:#0f0; font-weight:bold; text-align: center;">LITROS AL LLEGAR</span>
        <input type="number" id="litros-llegada" value="0" step="0.1">
        <button onclick="ejecutarCalibracion()" style="background:#0f0; border:none; border-radius:5px; font-weight:bold; width:100%; font-size:0.7em; padding:6px;">CALIBRAR ✅</button>
    </div>
    
    <div id="pantalla-informe">
        <button onclick="cerrarInforme()" style="background:#000; color:#fff; width: auto; padding: 10px; margin-bottom: 15px; border-radius: 10px;">⬅ VOLVER AL MAPA</button>
        <h2 style="text-align:center; margin-top:0;">HISTORIAL DE CONSUMO</h2>
        
        <div class="corte-card" style="background: #28a745;">
            <small>CORTE 7 DÍAS (Semanal)</small>
            <div id="c7" style="font-size: 1.3em; font-weight: bold;">0.00 km | 0.0 L</div>
        </div>
        <div class="corte-card" style="background: #17a2b8;">
            <small>CORTE 15 DÍAS (Quincenal)</small>
            <div id="c15" style="font-size: 1.3em; font-weight: bold;">0.00 km | 0.0 L</div>
        </div>
        <div class="corte-card" style="background: #6f42c1;">
            <small>CORTE 30 DÍAS (Mensual)</small>
            <div id="c30" style="font-size: 1.3em; font-weight: bold;">0.00 km | 0.0 L</div>
        </div>

        <div id="detalle-dia" style="background:#fff3cd; padding:15px; border-radius:12px; margin: 15px 0; border: 1px solid #ffeeba; font-size: 0.9em;">Selecciona un día abajo para ver el detalle.</div>

        <div class="btn-dias">
            <button onclick="verDia(this, 'Lunes')">LUN</button>
            <button onclick="verDia(this, 'Martes')">MAR</button>
            <button onclick="verDia(this, 'Miércoles')">MIE</button>
            <button onclick="verDia(this, 'Jueves')">JUE</button>
            <button onclick="verDia(this, 'Viernes')">VIE</button>
            <button onclick="verDia(this, 'Sábado')">SAB</button>
            <button onclick="verDia(this, 'Domingo')">DOM</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div id="extra-info-box">
            EXTRA: <span id="e-dist">0.00</span> km | <span id="e-time">00:00</span>
        </div>

        <div class="stats">
            <div class="stat-box"><span class="stat-label" style="display:block; font-size:0.6em; color:#0f0;">TIEMPO</span><span id="time" class="stat-val">00:00</span></div>
            <div class="stat-box"><span class="stat-label" style="display:block; font-size:0.6em; color:#0f0;">DISTANCIA</span><span id="dist" class="stat-val">0.00 km</span></div>
            <div class="stat-box"><span class="stat-label" style="display:block; font-size:0.6em; color:#0f0;">TANQUE</span><span id="fuel-bottom" class="stat-val" style="color: #0f0;">10.0 L</span></div>
        </div>

        <div id="setup-area">
            <input type="range" id="fuel-slider" min="0" max="15" step="0.5" value="10" style="width:100%; accent-color:#0f0;">
            <button class="btn-start" style="margin-top:10px" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>

        <div class="btn-group">
            <button id="pause-btn" style="display:none; background:#ffae00; flex:2" onclick="pausarRuta()">PAUSA ⏳</button>
            <button id="extra-btn" class="btn-extra" onclick="activarExtra()">EXTRA 🚀</button>
        </div>
        <button id="stop-btn" style="display:none; background:#ff0000; color:#fff" onclick="finalizarRuta()">TERMINAR DÍA 🏁</button>
        <button class="btn-informe" onclick="abrirInforme()">VER HISTORIAL DE CONSUMO 📊</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        let path = L.polyline([], {color: '#00fbff', weight: 6}).addTo(map);
        let marker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#0f0', fillOpacity: 1}).addTo(map);

        let segs = 0, eSegs = 0, timer, watchID, lastPos = null;
        let dRuta = 0, dExtra = 0, fuelI = 10, fuelR = 10, enP = false, enE = false;
        let factor = 0.05;

        document.getElementById('fuel-slider').oninput = function() {
            fuelI = parseFloat(this.value);
            fuelR = fuelI;
            actualizarUI();
        };

        function actualizarUI() {
            let num = fuelR.toFixed(1);
            let dTop = document.getElementById('tank-display-top');
            let dBottom = document.getElementById('fuel-bottom');
            dTop.innerText = num;
            dBottom.innerText = num + " L";

            // SI LLEGA A 4L O MENOS: ALERTA ROJA AGRESIVA
            if(fuelR <= 4.0) {
                dTop.classList.add('alerta-roja');
                dBottom.style.color = '#ff0000';
            } else {
                dTop.classList.remove('alerta-roja');
                dBottom.style.color = '#0f0';
            }
        }

        function ejecutarCalibracion() {
            let llegada = parseFloat(document.getElementById('litros-llegada').value);
            let totalKm = dRuta + dExtra;
            if(totalKm <= 0) return alert("¡Amo, ruede primero para poder sacar la cuenta!");
            factor = (fuelI - llegada) / totalKm;
            alert("✅ CALIBRADO: Lucy ya sabe cuánto consume tu Loncin.");
        }

        function iniciarRuta() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'block';
            document.getElementById('extra-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'block';
            timer = setInterval(() => {
                if(!enP) {
                    if(!enE) { segs++; document.getElementById('time').innerText = fmt(segs); }
                    else { eSegs++; document.getElementById('e-time').innerText = fmt(eSegs); }
                }
            }, 1000);
            if(navigator.geolocation) {
                watchID = navigator.geolocation.watchPosition(pos => {
                    if(enP) return;
                    let lat = pos.coords.latitude, lon = pos.coords.longitude;
                    if(lastPos) {
                        let d = 0.05; // Simulación de avance
                        fuelR -= (d * factor);
                        if(!enE) { dRuta += d; document.getElementById('dist').innerText = dRuta.toFixed(2) + " km"; }
                        else { dExtra += d; document.getElementById('e-dist').innerText = dExtra.toFixed(2); }
                        actualizarUI();
                    }
                    lastPos = {lat, lon};
                    marker.setLatLng([lat, lon]);
                    path.addLatLng([lat, lon]);
                    map.panTo([lat, lon]);
                }, null, {enableHighAccuracy: true});
            }
        }

        function activarExtra() {
            enE = !enE;
            document.getElementById('extra-info-box').style.display = enE ? 'block' : 'none';
            document.getElementById('extra-btn').style.background = enE ? "#ff00ea" : "#00fbff";
            document.getElementById('extra-btn').innerText = enE ? "EXTRA ON" : "EXTRA 🚀";
        }

        function pausarRuta() {
            enP = !enP;
            if(enP && lastPos) {
                let n = prompt("Nombre de la parada:");
                if(n) L.marker([lastPos.lat, lastPos.lon]).addTo(map).bindPopup(n).openPopup();
            }
            document.getElementById('pause-btn').innerText = enP ? "REANUDAR ▶️" : "PAUSA ⏳";
        }

        function fmt(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }

        function verDia(btn, dia) {
            document.querySelectorAll('.btn-dias button').forEach(b => b.style.background = '#eee');
            btn.style.background = '#0f0';
            document.getElementById('detalle-dia').innerHTML = `<b>DETALLE DEL ${dia.toUpperCase()}:</b><br>🛣️ Ruta Cliente: ${dRuta.toFixed(2)} km<br>🚀 Ruta Extra: ${dExtra.toFixed(2)} km<br>⛽ Gasolina gastada: ${(fuelI - fuelR).toFixed(1)} L`;
        }

        function finalizarRuta() { alert("¡Día terminado! Datos guardados en el historial."); location.reload(); }
        function abrirInforme() { document.getElementById('pantalla-informe').style.display = 'block'; }
        function cerrarInforme() { document.getElementById('pantalla-informe').style.display = 'none'; }
    </script>
</body>
</html>
