<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - V4.5 ULTRA INSTINTO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .top-panels { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 1000; pointer-events: none; }
        .row-panels { display: flex; justify-content: space-between; gap: 8px; }
        .panel-data { background: rgba(0,0,0,0.9); border: 2px solid #0f0; border-radius: 12px; padding: 8px; pointer-events: auto; flex: 1; box-shadow: 0 0 10px rgba(0,255,0,0.2); }
        .val-big { font-size: 1.2em; font-weight: 900; color: #0f0; display: block; }
        .unit-small { font-size: 0.6em; margin-left: 2px; }
        .txt-label { font-size: 0.55em; font-weight: bold; color: #aaa; text-transform: uppercase; display: block; }
        
        @keyframes alert-pulse { 0% { border-color: #f00; } 50% { border-color: #500; } 100% { border-color: #f00; } }
        .fuel-danger { animation: alert-pulse 0.5s infinite; color: #f00 !important; }

        .side-hud { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 12px; z-index: 2000; }
        .hud-btn { width: 45px; height: 45px; background: #000; border: 2px solid #0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2em; cursor: pointer; box-shadow: 0 0 10px #0f0; }
        
        .bottom-controls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; display: flex; gap: 10px; z-index: 1000; }
        .btn-main { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 1em; cursor: pointer; text-transform: uppercase; }
        .btn-rodar { background: #0f0; color: #000; }
        .btn-stop { background: #f00; color: #fff; }
        .btn-pause { background: #ffae00; color: #000; }

        #pantalla-historial, .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 4000; display: none; padding: 15px; overflow-y: auto; box-sizing: border-box; }
        .modal-box { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 20px; width: 90%; margin: 20% auto; }
        input { width: 100%; padding: 12px; background: #000; color: #0f0; border: 1px solid #0f0; border-radius: 10px; margin: 10px 0; box-sizing: border-box; font-size: 1.1em; }
        .card-hist { background: #151515; border-radius: 12px; padding: 10px; margin-bottom: 8px; border-left: 4px solid #ffae00; position: relative; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="top-panels">
        <div class="row-panels">
            <div class="panel-data" style="border-color: #ffae00;">
                <span class="txt-label">🏍️ RUTA ACTUAL</span>
                <span class="val-big" id="val-km">0.000<span class="unit-small">KM</span></span>
                <div style="display:grid; grid-template-columns: 1fr 1fr; font-size:0.65em; color:#aaa; margin-top:4px;">
                    <span id="val-time">00:00:00</span>
                    <span id="val-money-route" style="text-align:right; color:#0f0">$0.00</span>
                </div>
            </div>
            <div class="panel-data" id="panel-fuel" onclick="ajustarTanque()">
                <span class="txt-label">⛽ TANQUE</span>
                <span class="val-big" id="val-fuel">0.00<span class="unit-small">L</span></span>
                <span id="val-money-total" style="font-size:0.7em; color:#0f0">$0.00 Disp.</span>
            </div>
        </div>
    </div>

    <div class="side-hud">
        <div class="hud-btn" onclick="abrirHistorial()">📊</div>
        <div class="hud-btn" onclick="pegarUbicacion()">📍</div>
        <div class="hud-btn" id="btn-extra" onclick="toggleExtra()">🚀</div>
        <div class="hud-btn" onclick="abrirCalibracion()">🔧</div>
    </div>

    <div class="bottom-controls">
        <button id="btn-main" class="btn-main btn-rodar" onclick="controlRuta()">INICIAR RUTA</button>
        <button id="btn-pause" class="btn-main btn-pause" onclick="pausarRuta()" style="display:none;">PAUSAR ⏸</button>
    </div>

    <!-- MODAL NOMBRE CLIENTE -->
    <div id="modal-cliente" class="full-modal">
        <div class="modal-box">
            <h3 style="margin:0; color:#ffae00">📍 LLEGADA AL PUNTO</h3>
            <p style="font-size:0.8em; color:#888">Escribe el nombre del cliente o lugar para marcar el mapa.</p>
            <input type="text" id="input-cliente" placeholder="Nombre del Cliente...">
            <button class="btn-main btn-rodar" style="width:100%" onclick="confirmarPausa()">MARCAR Y PAUSAR ✅</button>
        </div>
    </div>

    <!-- MODAL CALIBRACIÓN -->
    <div id="modal-calibrar" class="full-modal">
        <div class="modal-box">
            <h3 style="margin:0; color:#0f0">🔧 CALIBRACIÓN DE CONSUMO</h3>
            <p style="font-size:0.8em; color:#888">Mide cuánto quedó en el tanque para que Lucy aprenda.</p>
            <input type="number" id="input-km-cal" placeholder="KM recorridos..." step="0.001">
            <input type="number" id="input-gas-cal" placeholder="Litros consumidos..." step="0.01">
            <button class="btn-main btn-rodar" style="width:100%" onclick="guardarCalibracion()">RECALCULAR FÓRMULA ⚡</button>
            <button onclick="cerrarModales()" style="background:none; color:#f00; border:none; width:100%; margin-top:10px;">CANCELAR</button>
        </div>
    </div>

    <div id="pantalla-historial">
        <button onclick="cerrarHistorial()" style="background:#222; color:#fff; border:none; padding:12px; border-radius:10px; width:100%; margin-bottom:10px">⬅ VOLVER AL MAPA</button>
        <div id="lista-historial"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map', {zoomControl: false}).setView([10.174, -67.915], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        // ETIQUETA CASA / TALLER
        L.marker([10.174, -67.915]).addTo(map).bindPopup("<b>Multiservicios Anato SMG</b>").openPopup();

        let marker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#0f0', fillOpacity: 1}).addTo(map);
        
        // BASE DE DATOS
        let DB = JSON.parse(localStorage.getItem('lucy_data')) || {
            registros: [], factor: 0.05, fuel: 14, res7: {km:0, gas:0, time:0}
        };

        let estado = "parado"; // parado, rodando, pausado
        let dTotal = 0, tTotal = 0, crono, ultimaPos = null;

        navigator.geolocation.watchPosition(pos => {
            let p = [pos.coords.latitude, pos.coords.longitude];
            marker.setLatLng(p);
            if(estado === "rodando" && ultimaPos){
                let dist = map.distance(ultimaPos, p) / 1000;
                if(dist > 0.001){
                    dTotal += dist;
                    DB.fuel -= (dist * DB.factor);
                    actualizarUI();
                }
            }
            ultimaPos = p;
        }, null, {enableHighAccuracy:true});

        function actualizarUI(){
            document.getElementById('val-km').innerHTML = dTotal.toFixed(3) + '<span class="unit-small">KM</span>';
            document.getElementById('val-time').innerText = formatTime(tTotal);
            document.getElementById('val-fuel').innerHTML = DB.fuel.toFixed(2) + '<span class="unit-small">L</span>';
            document.getElementById('val-money-total').innerText = "$" + (DB.fuel * 0.5).toFixed(2) + " Disp.";
            document.getElementById('val-money-route').innerText = "$" + (dTotal * DB.factor * 0.5).toFixed(2);
            
            if(DB.fuel <= 4) document.getElementById('panel-fuel').classList.add('fuel-danger');
            else document.getElementById('panel-fuel').classList.remove('fuel-danger');
        }

        function controlRuta(){
            const btn = document.getElementById('btn-main');
            const btnP = document.getElementById('btn-pause');

            if(estado === "parado" || estado === "pausado"){
                estado = "rodando";
                btn.innerText = "FINALIZAR JORNADA 🏁";
                btn.className = "btn-main btn-stop";
                btnP.style.display = "block";
                btnP.innerText = "PAUSAR ⏸";
                crono = setInterval(() => { tTotal++; actualizarUI(); }, 1000);
            } else {
                if(confirm("¿Deseas cerrar y guardar la ruta de hoy?")){
                    finalizarYGuardar();
                }
            }
        }

        function pausarRuta(){
            if(estado === "rodando"){
                document.getElementById('modal-cliente').style.display = 'block';
            } else if(estado === "pausado"){
                estado = "rodando";
                document.getElementById('btn-pause').innerText = "PAUSAR ⏸";
                crono = setInterval(() => { tTotal++; actualizarUI(); }, 1000);
            }
        }

        function confirmarPausa(){
            let nombre = document.getElementById('input-cliente').value || "Cliente";
            estado = "pausado";
            clearInterval(crono);
            document.getElementById('modal-cliente').style.display = 'none';
            document.getElementById('btn-pause').innerText = "REANUDAR ▶";
            L.marker(ultimaPos).addTo(map).bindPopup("<b>" + nombre + "</b>").openPopup();
        }

        function finalizarYGuardar(){
            let registro = {
                id: Date.now(),
                fecha: new Date().toLocaleString(),
                km: dTotal.toFixed(3),
                tiempo: formatTime(tTotal),
                costo: (dTotal * DB.factor * 0.5).toFixed(2)
            };
            DB.registros.unshift(registro);
            localStorage.setItem('lucy_data', JSON.stringify(DB));
            location.reload();
        }

        function ajustarTanque(){
            let nuevo = prompt("¿Cuántos litros reales tiene el tanque ahora?", DB.fuel.toFixed(2));
            if(nuevo) { DB.fuel = parseFloat(nuevo); actualizarUI(); }
        }

        function abrirCalibracion(){ document.getElementById('modal-calibrar').style.display = 'block'; }
        
        function guardarCalibracion(){
            let km = parseFloat(document.getElementById('input-km-cal').value);
            let gas = parseFloat(document.getElementById('input-gas-cal').value);
            if(km > 0 && gas > 0){
                DB.factor = gas / km;
                alert("Calibración exitosa: " + DB.factor.toFixed(4) + " L/KM");
                cerrarModales();
            }
        }

        function abrirHistorial(){
            const lista = document.getElementById('lista-historial');
            lista.innerHTML = DB.registros.map(r => `
                <div class="card-hist">
                    <b>📅 ${r.fecha}</b><br>
                    <span style="color:#0f0">${r.km} KM | ${r.tiempo} | Costo Gas: $${r.costo}</span>
                </div>
            `).join('');
            document.getElementById('pantalla-historial').style.display = 'block';
        }

        function formatTime(s){ return new Date(s * 1000).toISOString().substr(11, 8); }
        function cerrarHistorial(){ document.getElementById('pantalla-historial').style.display = 'none'; }
        function cerrarModales(){ document.querySelectorAll('.full-modal').forEach(m => m.style.display='none'); }
        
        actualizarUI();
    </script>
</body>
</html>
