<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCY JHA - FINAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; }
        
        /* CABECERA: LUCY Y TANQUE GIGANTE */
        #header { 
            position: absolute; top: 10px; width: 100%; display: flex; 
            justify-content: space-between; align-items: flex-start; padding: 0 15px; 
            box-sizing: border-box; z-index: 1000; 
        }
        #header h1 { margin: 0; font-size: 1.5em; color: #0f0; text-shadow: 0 0 10px #0f0; opacity: 0.8; }
        
        /* EL TANQUE GIGANTE QUE PEDISTE */
        #tank-display-top { 
            font-size: 5em; /* Tamaño masivo */
            font-weight: 900; 
            color: #0f0; 
            text-shadow: 0 0 20px #0f0; 
            line-height: 1em;
            margin-top: -5px;
        }

        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* CALIBRACIÓN ARRIBA IZQUIERDA */
        #calib-container { 
            position: absolute; top: 70px; left: 15px; z-index: 1000; 
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; border: 2px solid #0f0; 
        }

        #pantalla-informe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; color: #000; z-index: 2000; display: none; padding: 20px; box-sizing: border-box;
        }

        .controls { 
            position: absolute; bottom: 20px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.95); padding: 15px; border-radius: 20px;
            z-index: 1000; border: 2px solid #0f0;
        }

        .stats { display: flex; justify-content: space-around; margin-bottom: 12px; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.7em; color: #0f0; font-weight: bold; text-transform: uppercase; }
        .stat-val { font-size: 1.3em; font-weight: bold; display: block; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        
        .btn-start { background: #0f0; color: #000; }
        .btn-pause { background: #ffae00; color: #000; display: none; flex: 2; }
        .btn-extra { background: #00fbff; color: #000; display: none; flex: 1; }
        .btn-stop { background: #ff0000; color: #fff; display: none; }
        .btn-informe { background: #fff; color: #000; margin-top: 10px; border: 3px solid #0f0; }

        .btn-dias { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .btn-dias button { padding: 15px; background: #eee; color: #000; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="header">
        <h1>LUCY JHA</h1>
        <div id="tank-display-top">10.0</div> </div>

    <div id="calib-container">
        <span style="font-size: 0.7em; color:#0f0; display:block; font-weight:bold; margin-bottom:4px;">CALIBRAR (-)</span>
        <input type="number" id="calib-neg" value="0" step="0.5" style="width:70px; background:#000; color:#fff; border:1px solid #0f0; font-size:1.3em; text-align:center; border-radius:5px;">
    </div>
    
    <div id="pantalla-informe">
        <button onclick="cerrarInforme()" style="background:#000; color:#fff; margin-bottom:20px;">⬅ VOLVER AL MAPA</button>
        <h2 style="text-align:center">RESUMEN DE GASTOS</h2>
        <div style="background:#f0f0f0; padding:20px; border-radius:15px; line-height:2em;">
            <p><b>7 DÍAS:</b> <span id="inf-7">0.00 km | 0 L | 0 $</span></p>
            <p><b>15 DÍAS:</b> <span id="inf-15">0.00 km | 0 L | 0 $</span></p>
            <p><b>30 DÍAS:</b> <span id="inf-30">0.00 km | 0 L | 0 $</span></p>
        </div>
        <div class="btn-dias">
            <button onclick="this.style.background='#007bff'; this.style.color='#fff'">LUN</button>
            <button onclick="this.style.background='#28a745'; this.style.color='#fff'">MAR</button>
            <button onclick="this.style.background='#dc3545'; this.style.color='#fff'">MIE</button>
            <button onclick="this.style.background='#ffc107'; this.style.color='#fff'">JUE</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="controls">
        <div class="stats">
            <div class="stat-box"><span class="stat-label">TIEMPO</span><span id="time" class="stat-val">00:00</span></div>
            <div class="stat-box"><span class="stat-label">DISTANCIA</span><span id="dist" class="stat-val">0.00 km</span></div>
            <div class="stat-box"><span class="stat-label">TANQUE</span><span id="fuel-bottom" class="stat-val" style="color: #0f0;">10.0 L</span></div>
        </div>

        <div id="setup-area">
            <label style="display:block; text-align:center; font-weight:bold; margin-bottom:8px;">LITROS DE SALIDA: <span id="fuel-val">10.0</span> L</label>
            <input type="range" id="fuel-slider" min="0" max="15" step="0.5" value="10" style="width:100%; accent-color:#0f0;">
            <button class="btn-start" style="margin-top:15px" onclick="iniciarRuta()">¡A RODAR! 🏍️</button>
        </div>

        <div class="btn-group">
            <button id="pause-btn" class="btn-pause" onclick="pausarRuta()">PAUSA ⏳</button>
            <button id="extra-btn" class="btn-extra" onclick="activarExtra()">EXTRA</button>
        </div>
        <button id="stop-btn" class="btn-stop" onclick="finalizarRuta()">TERMINAR RUTA 🏁</button>
        <button id="inf-btn" class="btn-informe" onclick="abrirInforme()">VER INFORME 📊</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map = L.map('map').setView([10.17, -67.92], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let path = L.polyline([], {color: '#00fbff', weight: 6}).addTo(map);
        let marker = L.circleMarker([0,0], {radius: 8, color: '#fff', fillColor: '#0f0', fillOpacity: 1}).addTo(map);

        let segs = 0, timer, watchID, lastPos = null, totalDist = 0;
        let fuelRestante = 10, enPausa = false, enModoExtra = false;

        // SINCRONIZACIÓN DE TANQUE ARRIBA Y ABAJO
        document.getElementById('fuel-slider').oninput = function() {
            fuelRestante = parseFloat(this.value);
            let num = fuelRestante.toFixed(1);
            document.getElementById('fuel-val').innerText = num;
            document.getElementById('tank-display-top').innerText = num;
            document.getElementById('fuel-bottom').innerText = num + " L";
        };

        function iniciarRuta() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('pause-btn').style.display = 'block';
            document.getElementById('extra-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'block';
            
            timer = setInterval(() => {
                if(!enPausa) {
                    segs++;
                    let m = Math.floor(segs/60).toString().padStart(2,'0');
                    let s = (segs%60).toString().padStart(2,'0');
                    document.getElementById('time').innerText = `${m}:${s}`;
                }
            }, 1000);

            if(navigator.geolocation) {
                watchID = navigator.geolocation.watchPosition(pos => {
                    if(enPausa) return;
                    let lat = pos.coords.latitude, lon = pos.coords.longitude;
                    if(lastPos) {
                        // Cálculo de distancia real por GPS
                        let R = 6371; 
                        let dLat = (lat-lastPos.lat) * Math.PI / 180;
                        let dLon = (lon-lastPos.lon) * Math.PI / 180;
                        let a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lastPos.lat * Math.PI / 180) * Math.cos(lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                        let d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        
                        totalDist += d;
                        fuelRestante -= (d * 0.05); // Consumo ajustable
                        
                        document.getElementById('dist').innerText = totalDist.toFixed(2) + " km";
                        let num = Math.max(0, fuelRestante).toFixed(1);
                        document.getElementById('tank-display-top').innerText = num;
                        document.getElementById('fuel-bottom').innerText = num + " L";
                    }
                    lastPos = {lat, lon};
                    marker.setLatLng([lat, lon]);
                    if(!enModoExtra) path.addLatLng([lat, lon]);
                    map.panTo([lat, lon]);
                }, null, {enableHighAccuracy: true});
            }
        }

        function pausarRuta() {
            enPausa = !enPausa;
            if(enPausa && lastPos) {
                let nombre = prompt("Nombre de este punto (Ej: Cliente X):");
                if(nombre) L.marker([lastPos.lat, lastPos.lon]).addTo(map).bindPopup(nombre).openPopup();
            }
            document.getElementById('pause-btn').innerText = enPausa ? "REANUDAR ▶️" : "PAUSA ⏳";
            document.getElementById('pause-btn').style.background = enPausa ? "#0f0" : "#ffae00";
        }

        function activarExtra() {
            enModoExtra = !enModoExtra;
            document.getElementById('extra-btn').style.background = enModoExtra ? "#ff00ea" : "#00fbff";
            document.getElementById('extra-btn').innerText = enModoExtra ? "EXTRA ON" : "EXTRA";
        }

        function finalizarRuta() {
            clearInterval(timer);
            navigator.geolocation.clearWatch(watchID);
            alert("Ruta terminada. ¡Buen trabajo, amo!");
            location.reload(); 
        }

        function abrirInforme() { document.getElementById('pantalla-informe').style.display = 'block'; }
        function cerrarInforme() { document.getElementById('pantalla-informe').style.display = 'none'; }
    </script>
</body>
</html>
