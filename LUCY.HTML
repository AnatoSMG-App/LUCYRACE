<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LucyRace - GPS & Fuel Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Estilo Modo Oscuro Profesional 🌌 */
        body {
            background-color: #0b0e14;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenedor del Mapa 🗺️ */
        #map {
            flex-grow: 1;
            width: 100%;
            background: #1a1d23;
        }

        /* Panel de Control Inferior 🛠️ */
        .dashboard {
            background-color: #1a1d23;
            padding: 20px;
            border-top: 2px solid #2d333b;
            text-align: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .gas-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #888;
        }

        .stats span { color: #fff; font-weight: bold; }

        input[type=range] {
            width: 90%;
            margin: 15px 0;
            -webkit-appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            height: 8px;
            background: #2d333b;
            border-radius: 4px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #00ff41;
            -webkit-appearance: none;
            margin-top: -6px;
        }

        button {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            width: 80%;
            transition: 0.3s;
        }

        .btn-start { background-color: #00ff41; color: #0b0e14; }
        .btn-pause { background-color: #ffaa00; color: #0b0e14; display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="dashboard">
        <div class="stats">
            <div>Distancia: <span id="dist">0.0</span> km</div>
            <div>Tiempo: <span id="time">00:00</span></div>
        </div>

        <div class="gas-display">
            <span id="litros-val">10.0</span> L
        </div>

        <input type="range" id="gas-slider" min="1.0" max="14.0" step="0.5" value="10.0">
        
        <button id="main-btn" class="btn-start">¡A RODAR! 🏍️</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Inicializar Mapa (Usa una ubicación por defecto)
        const map = L.map('map').setView([10.64, -71.61], 15); // Cambiar coordenadas según tu ciudad
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        let path = L.polyline([], {color: '#00ff41', weight: 5}).addTo(map);
        let marker = L.circleMarker([10.64, -71.61], {radius: 8, color: '#fff', fillOpacity: 1}).addTo(map);

        // 2. Lógica de Gasolina
        const slider = document.getElementById('gas-slider');
        const display = document.getElementById('litros-val');
        const mainBtn = document.getElementById('main-btn');
        let enRuta = false;

        slider.oninput = function() {
            display.innerHTML = parseFloat(this.value).toFixed(1);
            display.style.color = (this.value <= 3) ? "#ff4141" : "#00ff41";
        }

        // 3. Simulación de grabación y "Modo Espera"
        mainBtn.onclick = function() {
            if (!enRuta) {
                // Iniciar Ruta
                enRuta = true;
                mainBtn.innerHTML = "MODO ESPERA ⏳";
                mainBtn.className = "btn-pause";
                slider.style.display = "none"; // Ocultar slider al rodar
                startGPS();
            } else {
                // Pausar (Modo Espera)
                alert("Entrando en Modo Espera en la ubicación del cliente...");
                enRuta = false;
                mainBtn.innerHTML = "REANUDAR RUTA ▶️";
                mainBtn.className = "btn-start";
            }
        }

        function startGPS() {
            // Aquí iría la conexión real con el GPS del móvil navigator.geolocation.watchPosition
            console.log("Lucy está grabando la línea del mapa...");
        }
    </script>
</body>
</html>
